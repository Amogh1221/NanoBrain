<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" width="900" height="450" style="background-color: white; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;">
  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#000"/></marker>
  </defs>

  <text x="450" y="30" font-size="20" font-weight="bold" text-anchor="middle" fill="#000">InstructGPT RLHF Training Pipeline</text>

  <!-- Step 1 -->
  <g transform="translate(50, 70)">
    <text x="100" y="0" font-size="16" font-weight="bold" text-anchor="middle" fill="#1D4ED8">Step 1: SFT</text>
    <rect x="0" y="20" width="200" height="300" rx="10" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
    
    <text x="100" y="50" font-size="14" font-weight="bold" text-anchor="middle">Collect demonstration data,</text>
    <text x="100" y="70" font-size="14" font-weight="bold" text-anchor="middle">and train a supervised policy.</text>
    
    <rect x="20" y="110" width="70" height="40" rx="5" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
    <text x="55" y="135" font-size="12" text-anchor="middle">Prompt</text>
    
    <path d="M 90 130 L 120 130" fill="none" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>
    
    <circle cx="150" cy="130" r="20" fill="#93C5FD" stroke="#1D4ED8" stroke-width="2"/>
    <text x="150" y="135" font-size="24" text-anchor="middle">👤</text>
    <text x="150" y="165" font-size="10" text-anchor="middle">Labeler</text>

    <path d="M 150 175 L 150 200" fill="none" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>
    
    <rect x="100" y="205" width="80" height="30" rx="5" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
    <text x="140" y="225" font-size="12" text-anchor="middle">Desired Output</text>
    
    <path d="M 55 155 Q 55 255 80 255" fill="none" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M 140 235 L 140 245 L 80 245" fill="none" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>
    
    <rect x="20" y="260" width="160" height="40" rx="5" fill="#1D4ED8" stroke="#1E3A8A" stroke-width="1.5"/>
    <text x="100" y="285" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">Fine-tune GPT-3</text>
  </g>

  <!-- Step 2 -->
  <g transform="translate(320, 70)">
    <text x="120" y="0" font-size="16" font-weight="bold" text-anchor="middle" fill="#B45309">Step 2: Reward Model</text>
    <rect x="0" y="20" width="240" height="350" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
    
    <text x="120" y="50" font-size="14" font-weight="bold" text-anchor="middle">Collect comparison data,</text>
    <text x="120" y="70" font-size="14" font-weight="bold" text-anchor="middle">and train a reward model.</text>
    
    <rect x="20" y="90" width="60" height="30" rx="5" fill="#FDE68A" stroke="#D97706" stroke-width="1.5"/>
    <text x="50" y="110" font-size="12" text-anchor="middle">Prompt</text>
    
    <path d="M 80 105 L 110 105" fill="none" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>
    
    <rect x="115" y="90" width="90" height="30" rx="5" fill="#1D4ED8" stroke="#1E3A8A" stroke-width="1.5"/>
    <text x="160" y="110" font-size="12" fill="#fff" text-anchor="middle">SFT Model</text>

    <path d="M 160 120 L 160 140 L 90 140 L 90 150" fill="none" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M 160 120 L 160 140 L 160 150" fill="none" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M 160 120 L 160 140 L 230 140 L 230 150" fill="none" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>
    
    <rect x="70" y="155" width="40" height="20" rx="3" fill="#FDE68A" stroke="#D97706" stroke-width="1"/>
    <rect x="140" y="155" width="40" height="20" rx="3" fill="#FDE68A" stroke="#D97706" stroke-width="1"/>
    <rect x="210" y="155" width="40" height="20" rx="3" fill="#FDE68A" stroke="#D97706" stroke-width="1"/>
    <text x="90" y="169" font-size="10" text-anchor="middle">Out A</text>
    <text x="160" y="169" font-size="10" text-anchor="middle">Out B</text>
    <text x="230" y="169" font-size="10" text-anchor="middle">Out C</text>
    
    <path d="M 160 180 L 160 200" fill="none" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>
    
    <circle cx="160" cy="220" r="20" fill="#FCD34D" stroke="#B45309" stroke-width="2"/>
    <text x="160" y="225" font-size="24" text-anchor="middle">👤</text>
    <text x="160" y="255" font-size="10" text-anchor="middle">Labeler ranks outputs</text>
    
    <rect x="120" y="270" width="80" height="30" rx="5" fill="#FDE68A" stroke="#D97706" stroke-width="1.5"/>
    <text x="160" y="289" font-size="12" text-anchor="middle">C > A > B</text>

    <path d="M 160 300 L 160 310" fill="none" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>
    
    <rect x="40" y="315" width="160" height="25" rx="5" fill="#B45309" stroke="#78350F" stroke-width="1.5"/>
    <text x="120" y="332" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">Train Reward Model</text>
  </g>

  <!-- Step 3 -->
  <g transform="translate(620, 70)">
    <text x="120" y="0" font-size="16" font-weight="bold" text-anchor="middle" fill="#047857">Step 3: PPO</text>
    <rect x="0" y="20" width="240" height="350" rx="10" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
    
    <text x="120" y="50" font-size="14" font-weight="bold" text-anchor="middle">Optimize a policy against</text>
    <text x="120" y="70" font-size="14" font-weight="bold" text-anchor="middle">the reward model with PPO.</text>
    
    <rect x="20" y="110" width="60" height="30" rx="5" fill="#A7F3D0" stroke="#059669" stroke-width="1.5"/>
    <text x="50" y="130" font-size="12" text-anchor="middle">Prompt</text>
    
    <path d="M 80 125 L 110 125" fill="none" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>
    
    <rect x="115" y="110" width="100" height="30" rx="5" fill="#1D4ED8" stroke="#1E3A8A" stroke-width="1.5"/>
    <text x="165" y="130" font-size="12" fill="#fff" text-anchor="middle">PPO Policy</text>

    <path d="M 165 140 L 165 170" fill="none" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="125" y="175" width="80" height="30" rx="5" fill="#A7F3D0" stroke="#059669" stroke-width="1.5"/>
    <text x="165" y="195" font-size="12" text-anchor="middle">Output</text>

    <path d="M 165 205 L 165 235" fill="none" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="115" y="240" width="100" height="30" rx="5" fill="#B45309" stroke="#78350F" stroke-width="1.5"/>
    <text x="165" y="260" font-size="12" fill="#fff" text-anchor="middle">Reward Model</text>

    <path d="M 165 270 L 165 295" fill="none" stroke="#000" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="195" y="285" font-size="14" font-weight="bold" fill="#047857">Reward</text>
    
    <path d="M 165 295 Q 230 330 230 200 Q 230 125 215 125" fill="none" stroke="#047857" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow)"/>
    <text x="180" y="325" font-size="12" fill="#047857" font-weight="bold">PPO Update</text>
  </g>
</svg>
