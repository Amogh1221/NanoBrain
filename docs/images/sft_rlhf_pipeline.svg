<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 380" width="820" height="380" style="background-color: white; font-family: sans-serif;">
  <defs>
    <marker id="arrow_b" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#000000"/></marker>
    <marker id="arrow_p" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#9333EA"/></marker>
  </defs>

  <!-- Stage 1 -->
  <rect x="30" y="140" width="160" height="100" rx="10" fill="#F3F4F6" stroke="#374151" stroke-width="2"/>
  <text x="110" y="165" font-size="13" font-weight="bold" text-anchor="middle" fill="#111827">Pretrained Base LLM</text>
  <text x="110" y="180" font-size="11" text-anchor="middle" fill="#4B5563">Next-token prediction only</text>
  <text x="40" y="205" font-size="10" fill="#111827">In:  'Capital of France?'</text>
  <text x="40" y="220" font-size="10" fill="#111827">Out: 'The city of Paris was...'</text>

  <line x1="190" y1="190" x2="255" y2="190" stroke="#000" stroke-width="2" marker-end="url(#arrow_b)"/>
  <text x="225" y="180" font-size="11" text-anchor="middle" font-weight="bold" fill="#111827">Supervised Fine-Tuning (SFT)</text>

  <!-- Stage 2 -->
  <rect x="260" y="140" width="150" height="100" rx="10" fill="#DBEAFE" stroke="#374151" stroke-width="2"/>
  <text x="335" y="165" font-size="13" font-weight="bold" text-anchor="middle" fill="#111827">SFT Model</text>
  <text x="335" y="180" font-size="11" text-anchor="middle" fill="#4B5563">Follows instructions</text>
  <text x="270" y="205" font-size="10" fill="#111827">In:  'Capital of France?'</text>
  <text x="270" y="220" font-size="10" fill="#111827">Out: 'Paris.'</text>

  <line x1="410" y1="190" x2="475" y2="190" stroke="#000" stroke-width="2" marker-end="url(#arrow_b)"/>
  <text x="445" y="180" font-size="11" text-anchor="middle" font-weight="bold" fill="#111827">Human preference data</text>

  <!-- Stage 3 -->
  <rect x="480" y="140" width="150" height="100" rx="10" fill="#FEF3C7" stroke="#374151" stroke-width="2"/>
  <text x="555" y="165" font-size="13" font-weight="bold" text-anchor="middle" fill="#111827">Reward Model</text>
  <text x="555" y="180" font-size="11" text-anchor="middle" fill="#4B5563">Scores responses</text>
  <text x="490" y="205" font-size="10" fill="#111827">'Paris.' → 9.2</text>
  <text x="490" y="220" font-size="10" fill="#111827">'The city of...' → 3.1</text>

  <line x1="630" y1="190" x2="685" y2="190" stroke="#000" stroke-width="2" marker-end="url(#arrow_b)"/>
  <text x="660" y="180" font-size="11" text-anchor="middle" font-weight="bold" fill="#111827">PPO Optimization</text>

  <!-- Stage 4 -->
  <rect x="690" y="140" width="115" height="100" rx="10" fill="#DCFCE7" stroke="#374151" stroke-width="2"/>
  <text x="747" y="165" font-size="13" font-weight="bold" text-anchor="middle" fill="#111827">Aligned Assistant</text>
  <text x="747" y="180" font-size="11" text-anchor="middle" fill="#4B5563">Helpful + Harmless</text>
  <text x="700" y="205" font-size="10" fill="#111827">In:  'Capital of France?'</text>
  <text x="700" y="220" font-size="10" fill="#111827">Out: 'Paris! Anything else?'</text>

  <!-- DPO Shortcut -->
  <path d="M 335 240 C 335 320, 747 320, 747 245" fill="none" stroke="#9333EA" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow_p)"/>
  <text x="541" y="310" font-size="12" text-anchor="middle" font-weight="bold" fill="#9333EA">DPO: skip reward model</text>

</svg>
