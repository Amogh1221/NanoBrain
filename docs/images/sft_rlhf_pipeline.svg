<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" width="100%" height="100%" style="background-color: #0d1117; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <style>
    .title { font-size: 18px; font-weight: bold; fill: #58a6ff; text-anchor: middle; }
    .box-title { font-size: 13px; font-weight: bold; fill: #ffffff; text-anchor: middle; }
    .sub-text { font-size: 11px; fill: #8b949e; text-anchor: middle; }
    .arrow { stroke: #58a6ff; stroke-width: 2; marker-end: url(#arrowhead); }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#58a6ff" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#0d1117"/>
  <text x="450" y="35" class="title">Post-Pretraining Alignment Pipeline (Pretraining → SFT → RLHF / DPO)</text>

  <!-- Stage 1: Pretrained LLM -->
  <rect x="40" y="80" width="170" height="220" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="125" y="110" class="box-title" style="fill:#58a6ff;">1. Base Pretrained Model</text>
  <text x="125" y="135" class="sub-text">NanoBrain Base Checkpoint</text>
  <text x="125" y="165" class="sub-text" style="fill:#c9d1d9;">Task: Raw text completion</text>
  <text x="125" y="195" class="sub-text" style="fill:#8b949e;">Example Prompt:</text>
  <text x="125" y="215" class="sub-text" style="fill:#f1c40f;">"The capital of France is"</text>
  <text x="125" y="235" class="sub-text" style="fill:#8b949e;">Completion:</text>
  <text x="125" y="255" class="sub-text" style="fill:#7ee787;">"Paris, which is known..."</text>

  <line x1="210" y1="190" x2="250" y2="190" class="arrow"/>

  <!-- Stage 2: SFT -->
  <rect x="265" y="80" width="170" height="220" rx="10" fill="#161b22" stroke="#388bfd" stroke-width="1.5"/>
  <text x="350" y="110" class="box-title" style="fill:#388bfd;">2. Supervised Fine-Tuning</text>
  <text x="350" y="135" class="sub-text">Instruction Dataset Pairs</text>
  <text x="350" y="165" class="sub-text" style="fill:#c9d1d9;">Task: Q&amp;A Chat format</text>
  <text x="350" y="195" class="sub-text" style="fill:#8b949e;">Instruction Prompt:</text>
  <text x="350" y="215" class="sub-text" style="fill:#f1c40f;">"User: What is Paris?"</text>
  <text x="350" y="235" class="sub-text" style="fill:#8b949e;">Target Output:</text>
  <text x="350" y="255" class="sub-text" style="fill:#7ee787;">"Assistant: Paris is..."</text>

  <line x1="435" y1="190" x2="475" y2="190" class="arrow"/>

  <!-- Stage 3: RLHF / DPO Alignment -->
  <rect x="490" y="80" width="170" height="220" rx="10" fill="#161b22" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="575" y="110" class="box-title" style="fill:#f59e0b;">3. RLHF / DPO Alignment</text>
  <text x="575" y="135" class="sub-text">Human Preference Optimization</text>
  <text x="575" y="165" class="sub-text" style="fill:#c9d1d9;">Pairs: Chosen vs Rejected</text>
  <text x="575" y="195" class="sub-text" style="fill:#7ee787;">✓ Chosen: Helpful/Safe</text>
  <text x="575" y="225" class="sub-text" style="fill:#ff7b72;">✗ Rejected: Harmful/Vague</text>
  <text x="575" y="260" class="sub-text" style="fill:#f1c40f;">Loss: DPO / PPO Reward</text>

  <line x1="660" y1="190" x2="700" y2="190" class="arrow"/>

  <!-- Stage 4: Production Chatbot -->
  <rect x="715" y="80" width="150" height="220" rx="10" fill="#238636" stroke="#3fb950" stroke-width="2"/>
  <text x="790" y="110" class="box-title" style="fill:#ffffff;">4. Aligned Chatbot</text>
  <text x="790" y="135" class="sub-text" style="fill:#e6ffec;">Production Ready</text>
  <text x="790" y="180" class="sub-text" style="fill:#ffffff; font-weight:bold;">ChatGPT / Claude</text>
  <text x="790" y="210" class="sub-text" style="fill:#e6ffec;">Helpful, Honest &amp; Harmless</text>

</svg>
