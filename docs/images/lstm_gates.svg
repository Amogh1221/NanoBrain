<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 390" width="720" height="390" style="background-color: white; font-family: sans-serif;">
  <defs>
    <marker id="arrow_black" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#000000"/></marker>
  </defs>

  <!-- Highway -->
  <line x1="100" y1="100" x2="650" y2="100" stroke="#0F766E" stroke-width="3" marker-end="url(#arrow_black)"/>
  <text x="375" y="90" font-size="14" font-weight="bold" text-anchor="middle" fill="#0F766E">Cell Memory Highway  C_t</text>
  <text x="70" y="105" font-size="14" font-weight="bold" text-anchor="middle" fill="#111827">C_{t-1}</text>
  <text x="670" y="105" font-size="14" font-weight="bold" text-anchor="middle" fill="#111827">C_t</text>
  
  <circle cx="280" cy="100" r="15" fill="#fff" stroke="#111827" stroke-width="2"/>
  <text x="280" y="105" font-size="16" text-anchor="middle" fill="#111827">⊗</text>

  <circle cx="450" cy="100" r="15" fill="#fff" stroke="#111827" stroke-width="2"/>
  <text x="450" y="105" font-size="16" text-anchor="middle" fill="#111827">⊕</text>

  <!-- Inputs -->
  <text x="80" y="320" font-size="14" font-weight="bold" text-anchor="middle" fill="#111827">x_t (current token)</text>
  <path d="M 80 300 L 160 300 L 160 200" fill="none" stroke="#000" stroke-width="2"/>
  
  <text x="80" y="240" font-size="14" font-weight="bold" text-anchor="middle" fill="#111827">h_{t-1} (prev. hidden)</text>
  <line x1="80" y1="220" x2="160" y2="220" stroke="#000" stroke-width="2"/>

  <!-- Combine x_t and h_{t-1} -->
  <circle cx="160" cy="210" r="5" fill="#000"/>
  <line x1="160" y1="210" x2="180" y2="210" stroke="#000" stroke-width="2"/>
  <line x1="180" y1="160" x2="180" y2="300" stroke="#000" stroke-width="2"/>
  
  <line x1="180" y1="160" x2="250" y2="160" stroke="#000" stroke-width="2" marker-end="url(#arrow_black)"/>
  <line x1="180" y1="200" x2="350" y2="200" stroke="#000" stroke-width="2" marker-end="url(#arrow_black)"/>
  <line x1="180" y1="260" x2="350" y2="260" stroke="#000" stroke-width="2" marker-end="url(#arrow_black)"/>
  <line x1="180" y1="300" x2="520" y2="300" stroke="#000" stroke-width="2" marker-end="url(#arrow_black)"/>

  <!-- Gate Boxes -->
  <!-- f_t -->
  <rect x="255" y="140" width="50" height="40" rx="5" fill="#FCA5A5" stroke="#374151" stroke-width="2"/>
  <text x="280" y="165" font-size="16" text-anchor="middle" font-weight="bold" fill="#111827">σ</text>
  <text x="280" y="195" font-size="11" text-anchor="middle" fill="#111827">What to erase</text>
  <line x1="280" y1="140" x2="280" y2="115" stroke="#000" stroke-width="2" marker-end="url(#arrow_black)"/>

  <!-- i_t -->
  <rect x="355" y="180" width="50" height="40" rx="5" fill="#BBF7D0" stroke="#374151" stroke-width="2"/>
  <text x="380" y="205" font-size="16" text-anchor="middle" font-weight="bold" fill="#111827">σ</text>
  <text x="380" y="235" font-size="11" text-anchor="middle" fill="#111827">What to write</text>

  <!-- C~_t -->
  <rect x="355" y="240" width="50" height="40" rx="5" fill="#BFDBFE" stroke="#374151" stroke-width="2"/>
  <text x="380" y="265" font-size="14" text-anchor="middle" font-weight="bold" fill="#111827">tanh</text>
  <text x="380" y="295" font-size="11" text-anchor="middle" fill="#111827">New candidate</text>

  <!-- combine i_t and C~_t -->
  <line x1="405" y1="200" x2="450" y2="200" stroke="#000" stroke-width="2"/>
  <line x1="405" y1="260" x2="450" y2="260" stroke="#000" stroke-width="2"/>
  <line x1="450" y1="200" x2="450" y2="245" stroke="#000" stroke-width="2"/>
  <circle cx="450" cy="230" r="15" fill="#fff" stroke="#111827" stroke-width="2"/>
  <text x="450" y="235" font-size="16" text-anchor="middle" fill="#111827">⊗</text>
  <line x1="450" y1="215" x2="450" y2="115" stroke="#000" stroke-width="2" marker-end="url(#arrow_black)"/>

  <!-- o_t -->
  <rect x="525" y="280" width="50" height="40" rx="5" fill="#E9D5FF" stroke="#374151" stroke-width="2"/>
  <text x="550" y="305" font-size="16" text-anchor="middle" font-weight="bold" fill="#111827">σ</text>
  <text x="550" y="335" font-size="11" text-anchor="middle" fill="#111827">What to expose</text>

  <!-- Output -->
  <rect x="525" y="130" width="50" height="40" rx="5" fill="#fff" stroke="#374151" stroke-width="2"/>
  <text x="550" y="155" font-size="14" text-anchor="middle" font-weight="bold" fill="#111827">tanh</text>
  <line x1="550" y1="100" x2="550" y2="130" stroke="#000" stroke-width="2" marker-end="url(#arrow_black)"/>
  
  <line x1="550" y1="170" x2="550" y2="215" stroke="#000" stroke-width="2"/>
  <circle cx="550" cy="230" r="15" fill="#fff" stroke="#111827" stroke-width="2"/>
  <text x="550" y="235" font-size="16" text-anchor="middle" fill="#111827">⊗</text>
  <line x1="550" y1="280" x2="550" y2="245" stroke="#000" stroke-width="2" marker-end="url(#arrow_black)"/>

  <line x1="565" y1="230" x2="620" y2="230" stroke="#000" stroke-width="2" marker-end="url(#arrow_black)"/>
  <text x="635" y="235" font-size="14" font-weight="bold" text-anchor="middle" fill="#111827">h_t</text>
  <line x1="620" y1="230" x2="620" y2="280" stroke="#000" stroke-width="2" marker-end="url(#arrow_black)"/>
  <text x="620" y="295" font-size="12" text-anchor="middle" fill="#111827">h_t output</text>

  <!-- Legend -->
  <rect x="20" y="340" width="120" height="40" rx="5" fill="#F3F4F6" stroke="#374151" stroke-width="1"/>
  <text x="70" y="355" font-size="10" text-anchor="middle" fill="#111827">⊗ = element-wise multiply</text>
  <text x="70" y="370" font-size="10" text-anchor="middle" fill="#111827">⊕ = element-wise add</text>

</svg>
