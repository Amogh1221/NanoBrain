<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" width="700" height="400" style="background-color: white; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;">
  <defs>
    <!-- Sharp filled triangle arrow -->
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- Cell Background -->
  <rect x="70" y="50" width="560" height="290" rx="20" fill="#E8EDDF" stroke="#B5B682" stroke-width="2"/>
  
  <!-- Lines (Buses) -->
  <g fill="none" stroke="#000" stroke-width="2.5">
    <!-- C bus -->
    <path d="M 10 100 L 685 100" marker-end="url(#arrow)"/>
    
    <!-- h bus (bottom) -->
    <path d="M 10 320 L 480 320"/>
    <!-- x input -->
    <path d="M 150 390 L 150 320"/>
    
    <!-- Branches to boxes -->
    <path d="M 180 320 L 180 275" marker-end="url(#arrow)"/>
    <path d="M 270 320 L 270 275" marker-end="url(#arrow)"/>
    <path d="M 350 320 L 350 275" marker-end="url(#arrow)"/>
    <path d="M 480 320 L 480 275" marker-end="url(#arrow)"/>
    
    <!-- Branches from boxes to ops -->
    <path d="M 180 225 L 180 118" marker-end="url(#arrow)"/>
    
    <path d="M 270 225 L 270 170 L 292 170" marker-end="url(#arrow)"/>
    <path d="M 350 225 L 350 170 L 328 170" marker-end="url(#arrow)"/>
    
    <path d="M 480 225 L 480 188" marker-end="url(#arrow)"/>
    
    <!-- Joint to add -->
    <path d="M 310 155 L 310 118" marker-end="url(#arrow)"/>
    
    <!-- Cell to tanh -->
    <path d="M 410 100 L 410 127" marker-end="url(#arrow)"/>
    
    <!-- Tanh to output joint -->
    <path d="M 410 173 L 410 170 L 462 170" marker-end="url(#arrow)"/>
    
    <!-- Output joint to right -->
    <path d="M 498 170 L 685 170" marker-end="url(#arrow)"/>
    
    <!-- Output joint branch up -->
    <path d="M 580 170 L 580 30" marker-end="url(#arrow)"/>
  </g>

  <!-- Dots at intersections -->
  <circle cx="150" cy="320" r="4" fill="#000" />
  <circle cx="180" cy="320" r="4" fill="#000" />
  <circle cx="270" cy="320" r="4" fill="#000" />
  <circle cx="350" cy="320" r="4" fill="#000" />
  <circle cx="480" cy="320" r="4" fill="#000" />
  <circle cx="410" cy="100" r="4" fill="#000" />
  <circle cx="580" cy="170" r="4" fill="#000" />

  <!-- Yellow Neural Net Boxes (45x45) -->
  <g fill="#F4D03F" stroke="#B7950B" stroke-width="1.5">
    <rect x="157.5" y="227.5" width="45" height="45" rx="8" />
    <rect x="247.5" y="227.5" width="45" height="45" rx="8" />
    <rect x="327.5" y="227.5" width="45" height="45" rx="8" />
    <rect x="457.5" y="227.5" width="45" height="45" rx="8" />
    <rect x="387.5" y="127.5" width="45" height="45" rx="8" />
  </g>
  
  <!-- Text in boxes -->
  <g font-size="20" text-anchor="middle" fill="#000">
    <text x="180" y="255" font-style="italic">σ</text>
    <text x="270" y="255" font-style="italic">σ</text>
    <text x="350" y="255" font-size="16">tanh</text>
    <text x="480" y="255" font-style="italic">σ</text>
    <text x="410" y="155" font-size="16">tanh</text>
  </g>

  <!-- Pink Pointwise Ops (r=15) -->
  <g fill="#F1948A" stroke="#E74C3C" stroke-width="1.5">
    <circle cx="180" cy="100" r="15" />
    <circle cx="310" cy="170" r="15" />
    <circle cx="310" cy="100" r="15" />
    <circle cx="480" cy="170" r="15" />
  </g>
  
  <g font-size="22" font-weight="bold" text-anchor="middle" fill="#000">
    <text x="180" y="106">×</text>
    <text x="310" y="176">×</text>
    <text x="310" y="107">+</text>
    <text x="480" y="176">×</text>
  </g>

  <!-- External Labels -->
  <g font-size="18" font-weight="bold" fill="#000">
    <!-- Top bus -->
    <text x="30" y="85">C<tspan dy="5" font-size="12">t-1</tspan></text>
    <text x="660" y="85">C<tspan dy="5" font-size="12">t</tspan></text>
    
    <!-- Bottom bus -->
    <text x="30" y="310">h<tspan dy="5" font-size="12">t-1</tspan></text>
    <text x="165" y="380">x<tspan dy="5" font-size="12">t</tspan></text>
    
    <!-- Outputs -->
    <text x="660" y="160">h<tspan dy="5" font-size="12">t</tspan></text>
    <text x="595" y="50">h<tspan dy="5" font-size="12">t</tspan></text>
  </g>
</svg>