<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 450" width="100%" height="100%" style="background-color: #0d1117; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <style>
    .title { font-size: 18px; font-weight: bold; fill: #58a6ff; text-anchor: middle; }
    .box-title { font-size: 13px; font-weight: bold; fill: #ffffff; text-anchor: middle; }
    .sub-text { font-size: 11px; fill: #8b949e; text-anchor: middle; }
    .highway { stroke: #3fb950; stroke-width: 4; fill: none; }
    .arrow { stroke: #58a6ff; stroke-width: 2; marker-end: url(#arrowhead); }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#58a6ff" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#0d1117"/>
  <text x="425" y="35" class="title">LSTM Cell Gating Mechanics &amp; Memory Highway</text>

  <!-- Cell State Highway C_t -->
  <path d="M 50 100 L 800 100" class="highway"/>
  <text x="75" y="80" class="sub-text" style="fill:#3fb950; font-weight:bold; font-size:12px;">Cell Memory Highway (C_{t-1} → C_t)</text>

  <!-- Outer Cell Box -->
  <rect x="120" y="130" width="600" height="280" rx="12" fill="#161b22" stroke="#30363d" stroke-width="2"/>

  <!-- Forget Gate f_t -->
  <rect x="150" y="240" width="110" height="60" rx="8" fill="#da3633" stroke="#f85149" stroke-width="1.5"/>
  <text x="205" y="267" class="box-title">Forget Gate f_t</text>
  <text x="205" y="285" class="sub-text" style="fill:#ff7b72;">σ(W_f · [h_{t-1}, x_t])</text>
  <text x="205" y="325" class="sub-text" style="fill:#ff7b72;">Erase old memory</text>

  <!-- Input Gate i_t & Candidate C~_t -->
  <rect x="290" y="240" width="130" height="60" rx="8" fill="#238636" stroke="#3fb950" stroke-width="1.5"/>
  <text x="355" y="267" class="box-title">Input Gate i_t</text>
  <text x="355" y="285" class="sub-text" style="fill:#7ee787;">σ(W_i) * tanh(C~_t)</text>
  <text x="355" y="325" class="sub-text" style="fill:#7ee787;">Write new memory</text>

  <!-- Output Gate o_t -->
  <rect x="460" y="240" width="110" height="60" rx="8" fill="#8957e5" stroke="#ab7df8" stroke-width="1.5"/>
  <text x="515" y="267" class="box-title">Output Gate o_t</text>
  <text x="515" y="285" class="sub-text" style="fill:#d2a8ff;">σ(W_o · [h, x])</text>
  <text x="515" y="325" class="sub-text" style="fill:#d2a8ff;">Expose hidden h_t</text>

  <!-- Hidden State Output h_t -->
  <rect x="600" y="240" width="90" height="60" rx="8" fill="#1f6feb" stroke="#388bfd" stroke-width="1.5"/>
  <text x="645" y="270" class="box-title">Hidden h_t</text>
  <text x="645" y="288" class="sub-text" style="fill:#79c0ff;">o_t * tanh(C_t)</text>

  <!-- Inputs x_t and h_{t-1} -->
  <line x1="50" y1="370" x2="690" y2="370" stroke="#58a6ff" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="80" y="360" class="sub-text" style="fill:#58a6ff;">Inputs: x_t (Current Word) + h_{t-1} (Previous Hidden State)</text>

</svg>
