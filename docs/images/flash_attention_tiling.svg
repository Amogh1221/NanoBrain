<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450" style="background-color: white; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;">
  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#4B5563"/></marker>
    <marker id="arrow_out" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#DC2626"/></marker>
  </defs>

  <!-- HBM Main Memory -->
  <rect x="50" y="300" width="500" height="120" rx="10" fill="#E0F2FE" stroke="#0284C7" stroke-width="3"/>
  <text x="300" y="330" font-size="18" font-weight="bold" fill="#0369A1" text-anchor="middle">High Bandwidth Memory (HBM)</text>
  <text x="300" y="345" font-size="12" fill="#0369A1" text-anchor="middle">Large but slow (~40GB)</text>

  <!-- HBM Matrices -->
  <g transform="translate(100, 360)">
    <rect x="0" y="0" width="80" height="40" fill="#BAE6FD" stroke="#0284C7" stroke-width="1.5"/>
    <text x="40" y="25" font-size="16" font-weight="bold" fill="#0369A1" text-anchor="middle">Q, K, V</text>
    
    <rect x="320" y="0" width="80" height="40" fill="#FECACA" stroke="#DC2626" stroke-width="1.5"/>
    <text x="360" y="25" font-size="16" font-weight="bold" fill="#991B1B" text-anchor="middle">Output O</text>
  </g>

  <!-- SRAM On-Chip Memory -->
  <rect x="150" y="50" width="300" height="150" rx="10" fill="#DCFCE7" stroke="#16A34A" stroke-width="3"/>
  <text x="300" y="80" font-size="18" font-weight="bold" fill="#15803D" text-anchor="middle">SRAM (On-Chip)</text>
  <text x="300" y="95" font-size="12" fill="#15803D" text-anchor="middle">Small but extremely fast (~192KB)</text>

  <!-- SRAM Blocks (Tiling) -->
  <g transform="translate(180, 120)">
    <rect x="0" y="0" width="40" height="40" fill="#86EFAC" stroke="#16A34A" stroke-width="1.5"/>
    <text x="20" y="25" font-size="14" font-weight="bold" fill="#14532D" text-anchor="middle">Q_i</text>
    
    <rect x="50" y="0" width="40" height="40" fill="#86EFAC" stroke="#16A34A" stroke-width="1.5"/>
    <text x="70" y="25" font-size="14" font-weight="bold" fill="#14532D" text-anchor="middle">K_j</text>

    <rect x="100" y="0" width="40" height="40" fill="#86EFAC" stroke="#16A34A" stroke-width="1.5"/>
    <text x="120" y="25" font-size="14" font-weight="bold" fill="#14532D" text-anchor="middle">V_j</text>

    <!-- Compute -->
    <path d="M 160 20 L 190 20" fill="none" stroke="#16A34A" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="175" y="10" font-size="12" fill="#15803D" text-anchor="middle">Compute</text>
    
    <rect x="200" y="0" width="40" height="40" fill="#FCA5A5" stroke="#DC2626" stroke-width="1.5"/>
    <text x="220" y="25" font-size="14" font-weight="bold" fill="#7F1D1D" text-anchor="middle">O_i</text>
  </g>

  <!-- Arrows Loading -->
  <!-- Load Q_i -->
  <path d="M 140 360 Q 140 250 190 160" fill="none" stroke="#4B5563" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow)"/>
  <text x="120" y="260" font-size="12" fill="#4B5563" font-weight="bold">Load blocks</text>
  <!-- Load K_j -->
  <path d="M 150 360 Q 190 250 240 160" fill="none" stroke="#4B5563" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow)"/>
  <!-- Load V_j -->
  <path d="M 160 360 Q 240 250 290 160" fill="none" stroke="#4B5563" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow)"/>

  <!-- Arrow Store -->
  <path d="M 400 160 Q 460 250 460 360" fill="none" stroke="#DC2626" stroke-width="3" marker-end="url(#arrow_out)"/>
  <text x="490" y="260" font-size="12" fill="#DC2626" font-weight="bold">Write O_i</text>

  <!-- Note -->
  <rect x="150" y="210" width="300" height="60" rx="5" fill="#FEF9C3" stroke="#CA8A04" stroke-width="1.5"/>
  <text x="300" y="235" font-size="12" font-weight="bold" fill="#854D0E" text-anchor="middle">Avoids writing N x N Attention matrix to HBM!</text>
  <text x="300" y="255" font-size="11" fill="#854D0E" text-anchor="middle">S_ij and P_ij are computed fully in SRAM.</text>
</svg>
