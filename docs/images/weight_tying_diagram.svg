<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="500" height="400" style="background-color: white; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;">
  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#000"/></marker>
  </defs>

  <text x="250" y="40" font-size="20" font-weight="bold" text-anchor="middle" fill="#111827">Weight Tying in Language Models</text>
  <text x="250" y="60" font-size="14" fill="#4B5563" text-anchor="middle">(Press &amp; Wolf, 2016)</text>

  <!-- Input Token Embedding -->
  <g transform="translate(50, 100)">
    <text x="75" y="0" font-size="14" font-weight="bold" text-anchor="middle">Input Embedding Matrix</text>
    <text x="75" y="15" font-size="12" fill="#4B5563" text-anchor="middle">Shape: Vocab × Dim</text>
    
    <rect x="25" y="30" width="100" height="150" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
    <text x="75" y="105" font-size="20" font-weight="bold" fill="#1E3A8A" text-anchor="middle">W</text>
    
    <!-- Token indices -->
    <text x="10" y="50" font-size="12" fill="#4B5563" text-anchor="end">Token 1</text>
    <text x="10" y="80" font-size="12" fill="#4B5563" text-anchor="end">Token 2</text>
    <text x="10" y="110" font-size="12" fill="#4B5563" text-anchor="end">...</text>
    <text x="10" y="160" font-size="12" fill="#4B5563" text-anchor="end">Token V</text>
  </g>

  <!-- Sharing Indicator -->
  <path d="M 190 205 Q 250 205 310 205" fill="none" stroke="#10B981" stroke-width="3" stroke-dasharray="8,4" marker-end="url(#arrow)"/>
  <path d="M 310 205 Q 250 205 190 205" fill="none" stroke="#10B981" stroke-width="3" stroke-dasharray="8,4" marker-end="url(#arrow)"/>
  <text x="250" y="195" font-size="14" font-weight="bold" fill="#047857" text-anchor="middle">Shared Weights</text>

  <!-- Output Projection -->
  <g transform="translate(300, 100)">
    <text x="75" y="0" font-size="14" font-weight="bold" text-anchor="middle">Output Projection Matrix</text>
    <text x="75" y="15" font-size="12" fill="#4B5563" text-anchor="middle">Shape: Dim × Vocab</text>
    
    <rect x="0" y="110" width="150" height="70" fill="#DCFCE7" stroke="#16A34A" stroke-width="2"/>
    <text x="75" y="155" font-size="20" font-weight="bold" fill="#14532D" text-anchor="middle">W<tspan dy="-10" font-size="14">T</tspan></text>
    
    <!-- Token probabilities -->
    <text x="20" y="200" font-size="12" fill="#4B5563" text-anchor="middle">Prob 1</text>
    <text x="75" y="200" font-size="12" fill="#4B5563" text-anchor="middle">...</text>
    <text x="130" y="200" font-size="12" fill="#4B5563" text-anchor="middle">Prob V</text>
  </g>

  <rect x="50" y="320" width="400" height="60" rx="5" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1"/>
  <text x="250" y="345" font-size="14" font-weight="bold" fill="#111827" text-anchor="middle">Benefits of Weight Tying</text>
  <text x="250" y="365" font-size="12" fill="#374151" text-anchor="middle">Saves massive amount of parameters (~30% of small models)</text>
</svg>
