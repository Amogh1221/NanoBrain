<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500" style="background-color: white; font-family: sans-serif;">
  <defs>
    <marker id="arrow_black" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#000000"/></marker>
  </defs>

  <rect x="50" y="50" width="300" height="70" rx="10" fill="#DCFCE7" stroke="#16A34A" stroke-width="2"/>
  <text x="200" y="75" font-size="14" font-weight="bold" text-anchor="middle" fill="#111827">lm_head  (Output Projection)</text>
  <text x="200" y="95" font-size="10" text-anchor="middle" fill="#111827">hidden state [B×T×768] → logits [B×T×50258]</text>

  <rect x="50" y="170" width="300" height="90" rx="10" fill="#FEF3C7" stroke="#D97706" stroke-width="4"/>
  <text x="200" y="200" font-size="14" font-weight="bold" text-anchor="middle" fill="#111827">Shared Weight Matrix  W_te</text>
  <text x="200" y="220" font-size="12" text-anchor="middle" fill="#111827">shape: 50,258 × 768</text>
  <text x="200" y="240" font-size="10" font-style="italic" text-anchor="middle" fill="#B45309">Single parameter tensor in memory</text>

  <rect x="50" y="310" width="300" height="70" rx="10" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <text x="200" y="335" font-size="14" font-weight="bold" text-anchor="middle" fill="#111827">Token Embedding  (wte)</text>
  <text x="200" y="355" font-size="10" text-anchor="middle" fill="#111827">token index [integer] → dense vector [768-dim]</text>

  <!-- Arrows -->
  <line x1="330" y1="170" x2="330" y2="130" stroke="#000" stroke-width="2" marker-end="url(#arrow_black)"/>
  <text x="320" y="153" font-size="10" text-anchor="end" fill="#111827">Forward: W^T → logits</text>

  <line x1="330" y1="260" x2="330" y2="300" stroke="#000" stroke-width="2" marker-end="url(#arrow_black)"/>
  <text x="320" y="283" font-size="10" text-anchor="end" fill="#111827">Forward: W → embeddings</text>

  <!-- Savings Annotation -->
  <rect x="30" y="410" width="340" height="80" rx="5" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1"/>
  <text x="40" y="430" font-size="12" fill="#111827">Without tying:</text>
  <text x="40" y="445" font-size="12" fill="#111827">  2 × 50,258 × 768 = 77,196,288 params</text>
  <text x="40" y="465" font-size="12" fill="#111827">With tying:</text>
  <text x="40" y="480" font-size="12" fill="#111827">  1 × 50,258 × 768 = 38,598,144 params</text>
  <text x="360" y="480" font-size="12" font-weight="bold" text-anchor="end" fill="#047857">Savings: 38,598,144 params (~31%)</text>
</svg>
