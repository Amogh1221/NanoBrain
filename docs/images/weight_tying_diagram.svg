<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480" width="100%" height="100%" style="background-color: #0d1117; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <style>
    .title { font-size: 18px; font-weight: bold; fill: #58a6ff; text-anchor: middle; }
    .box-title { font-size: 14px; font-weight: bold; fill: #ffffff; text-anchor: middle; }
    .sub-text { font-size: 11px; fill: #8b949e; text-anchor: middle; }
    .arrow { stroke: #f1c40f; stroke-width: 2.5; marker-end: url(#arrowhead-gold); }
  </style>

  <defs>
    <marker id="arrowhead-gold" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f1c40f" />
    </marker>
    <linearGradient id="grad-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97706" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="#0d1117"/>
  <text x="300" y="35" class="title">Weight Tying Architecture (wte == lm_head)</text>

  <!-- Top Output Logits -->
  <rect x="150" y="70" width="300" height="50" rx="8" fill="#1f6feb" stroke="#388bfd" stroke-width="1.5"/>
  <text x="300" y="95" class="box-title">Output Projection (lm_head)</text>
  <text x="300" y="110" class="sub-text" style="fill:#79c0ff;">Uses W_te^T Matrix → Logits [B, T, 50258]</text>

  <!-- Center Shared Matrix W_te -->
  <rect x="130" y="180" width="340" height="90" rx="12" fill="url(#grad-gold)" stroke="#f59e0b" stroke-width="2"/>
  <text x="300" y="215" class="box-title" style="font-size:16px;">Shared Weight Matrix W_te</text>
  <text x="300" y="240" class="sub-text" style="fill:#fef3c7; font-size:13px; font-weight:600;">Shape: [50,258 × 768] (38,598,144 Parameters)</text>
  <text x="300" y="258" class="sub-text" style="fill:#fde68a;">Reused in both Input Embedding and Output Head</text>

  <!-- Bottom Input Embedding -->
  <rect x="150" y="330" width="300" height="50" rx="8" fill="#238636" stroke="#3fb950" stroke-width="1.5"/>
  <text x="300" y="355" class="box-title">Input Token Embedding (wte)</text>
  <text x="300" y="370" class="sub-text" style="fill:#7ee787;">Uses W_te Matrix Lookup → Vectors [B, T, 768]</text>

  <!-- Arrows -->
  <line x1="300" y1="180" x2="300" y2="125" class="arrow"/>
  <line x1="300" y1="330" x2="300" y2="275" class="arrow"/>

  <text x="300" y="430" class="sub-text" style="fill:#3fb950; font-size:13px; font-weight:bold;">
    ✅ Saves 38,598,144 duplicate parameters &amp; enforces semantic space symmetry
  </text>

</svg>
