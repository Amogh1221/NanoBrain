<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" width="600" height="380" style="background-color: white; font-family: sans-serif;">
  <defs>
    <marker id="arrow_red" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#EF4444"/></marker>
  </defs>
  
  <g transform="translate(60, 20)">
    <!-- Grid -->
    <rect x="0" y="0" width="500" height="300" fill="#fff" stroke="#D1D5DB" stroke-width="1"/>
    <line x1="0" y1="250" x2="500" y2="250" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="5,5"/> <!-- y=0 -->
    <line x1="250" y1="0" x2="250" y2="300" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="5,5"/> <!-- x=0 -->

    <line x1="83.3" y1="0" x2="83.3" y2="300" stroke="#F3F4F6" stroke-width="1"/>
    <line x1="166.7" y1="0" x2="166.7" y2="300" stroke="#F3F4F6" stroke-width="1"/>
    <line x1="333.3" y1="0" x2="333.3" y2="300" stroke="#F3F4F6" stroke-width="1"/>
    <line x1="416.7" y1="0" x2="416.7" y2="300" stroke="#F3F4F6" stroke-width="1"/>

    <line x1="0" y1="166.7" x2="500" y2="166.7" stroke="#F3F4F6" stroke-width="1"/>
    <line x1="0" y1="83.3" x2="500" y2="83.3" stroke="#F3F4F6" stroke-width="1"/>
    
    <rect x="0" y="250" width="250" height="50" fill="#FEE2E2" opacity="0.3"/>
    
    <text x="100" y="280" font-size="12" fill="#EF4444">Dead zone (grad = 0)</text>
    <line x1="125" y1="268" x2="125" y2="255" stroke="#EF4444" stroke-width="2" marker-end="url(#arrow_red)"/>
    
    <!-- Axes labels -->
    <text x="250" y="330" font-size="14" font-weight="bold" text-anchor="middle" fill="#111827">Input x</text>
    <text x="-40" y="150" font-size="14" font-weight="bold" text-anchor="middle" fill="#111827" transform="rotate(-90 -40 150)">f(x)</text>

    <!-- Ticks -->
    <text x="83.3" y="315" font-size="12" text-anchor="middle" fill="#4B5563">-2</text>
    <text x="166.7" y="315" font-size="12" text-anchor="middle" fill="#4B5563">-1</text>
    <text x="250" y="315" font-size="12" text-anchor="middle" fill="#4B5563">0</text>
    <text x="333.3" y="315" font-size="12" text-anchor="middle" fill="#4B5563">1</text>
    <text x="416.7" y="315" font-size="12" text-anchor="middle" fill="#4B5563">2</text>
    
    <text x="-15" y="254" font-size="12" text-anchor="end" fill="#4B5563">0</text>
    <text x="-15" y="170" font-size="12" text-anchor="end" fill="#4B5563">1</text>
    <text x="-15" y="87" font-size="12" text-anchor="end" fill="#4B5563">2</text>

    <!-- Curves (x from -3 to +3, scale = 500/6 = 83.33 px per unit. y from -0.5 to +3.0, scale = 300/3.5 = 85.7 px per unit) -->
    <!-- origin at x=250, y=250 -->
    <!-- ReLU -->
    <polyline points="0,250 250,250 500,35.7" fill="none" stroke="#2563EB" stroke-width="2"/>
    
    <!-- GELU (approx: 0.5x(1+tanh(sqrt(2/pi)*(x+0.044715x^3)))) -->
    <!-- Points hardcoded for shape -->
    <polyline points="0,250 83,250 167,263 208,264 250,250 333,153 417,107 500,35.7" fill="none" stroke="#0D9488" stroke-width="2"/>
    
    <!-- Swish (x * sigmoid(x)) -->
    <polyline points="0,246 83,240 167,227 208,212 250,250 333,142 417,107 500,35.7" fill="none" stroke="#F97316" stroke-width="2" stroke-dasharray="5,5"/>

    <!-- SwiGLU (approx scale) -->
    <polyline points="0,250 83,248 167,235 208,220 250,250 333,120 417,80 500,10" fill="none" stroke="#EF4444" stroke-width="2" stroke-dasharray="2,2"/>

    <text x="350" y="170" font-size="12" fill="#0D9488" font-weight="bold">GELU (smooth)</text>
    
    <!-- Legend -->
    <rect x="10" y="10" width="300" height="25" fill="#fff" stroke="#D1D5DB" stroke-width="1"/>
    <line x1="20" y1="22.5" x2="40" y2="22.5" stroke="#2563EB" stroke-width="2"/>
    <text x="45" y="27" font-size="12" font-weight="bold" fill="#111827">ReLU</text>
    
    <line x1="90" y1="22.5" x2="110" y2="22.5" stroke="#0D9488" stroke-width="2"/>
    <text x="115" y="27" font-size="12" font-weight="bold" fill="#111827">GELU</text>
    
    <line x1="160" y1="22.5" x2="180" y2="22.5" stroke="#F97316" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="185" y="27" font-size="12" font-weight="bold" fill="#111827">Swish</text>

    <line x1="230" y1="22.5" x2="250" y2="22.5" stroke="#EF4444" stroke-width="2" stroke-dasharray="2,2"/>
    <text x="255" y="27" font-size="12" font-weight="bold" fill="#111827">SwiGLU</text>
  </g>
</svg>
