<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="700" height="350" style="background-color: white; font-family: sans-serif;">
  <defs>
    <marker id="arrow_black" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#000000"/></marker>
    <marker id="arrow_teal" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#0D9488"/></marker>
  </defs>

  <!-- Left Panel -->
  <rect x="0" y="0" width="350" height="350" fill="#FFF8F0"/>
  <text x="175" y="40" font-size="18" font-weight="bold" text-anchor="middle" fill="#D97706">Sequential Processing</text>
  
  <g transform="translate(35, 120)">
    <!-- Boxes -->
    <rect x="0" y="0" width="35" height="30" rx="5" fill="#E5E7EB" stroke="#374151"/><text x="17" y="19" font-size="12" text-anchor="middle">x1</text>
    <rect x="60" y="0" width="35" height="30" rx="5" fill="#E5E7EB" stroke="#374151"/><text x="77" y="19" font-size="12" text-anchor="middle">x2</text>
    <rect x="120" y="0" width="35" height="30" rx="5" fill="#E5E7EB" stroke="#374151"/><text x="137" y="19" font-size="12" text-anchor="middle">x3</text>
    <rect x="180" y="0" width="35" height="30" rx="5" fill="#E5E7EB" stroke="#374151"/><text x="197" y="19" font-size="12" text-anchor="middle">x4</text>
    <rect x="240" y="0" width="35" height="30" rx="5" fill="#E5E7EB" stroke="#374151"/><text x="257" y="19" font-size="12" text-anchor="middle">x5</text>
    <!-- Arrows -->
    <line x1="35" y1="15" x2="55" y2="15" stroke="#000" stroke-width="2" marker-end="url(#arrow_black)"/>
    <line x1="95" y1="15" x2="115" y2="15" stroke="#000" stroke-width="2" marker-end="url(#arrow_black)"/>
    <line x1="155" y1="15" x2="175" y2="15" stroke="#000" stroke-width="2" marker-end="url(#arrow_black)"/>
    <line x1="215" y1="15" x2="235" y2="15" stroke="#000" stroke-width="2" marker-end="url(#arrow_black)"/>
    <!-- Hidden State Arcs -->
    <path d="M 17 -10 Q 47 -40 77 -10" fill="none" stroke="#D97706" stroke-width="2" marker-end="url(#arrow_black)"/>
    <text x="47" y="-28" font-size="10" text-anchor="middle" fill="#D97706">h1→h2</text>
    <path d="M 77 -10 Q 107 -40 137 -10" fill="none" stroke="#D97706" stroke-width="2" marker-end="url(#arrow_black)"/>
    <text x="107" y="-28" font-size="10" text-anchor="middle" fill="#D97706">h2→h3</text>
    <path d="M 137 -10 Q 167 -40 197 -10" fill="none" stroke="#D97706" stroke-width="2" marker-end="url(#arrow_black)"/>
    <text x="167" y="-28" font-size="10" text-anchor="middle" fill="#D97706">h3→h4</text>
    <path d="M 197 -10 Q 227 -40 257 -10" fill="none" stroke="#D97706" stroke-width="2" marker-end="url(#arrow_black)"/>
    <text x="227" y="-28" font-size="10" text-anchor="middle" fill="#D97706">h4→h5</text>
  </g>
  
  <g transform="translate(130, 240)">
    <rect x="0" y="0" width="10" height="10" fill="#22C55E"/>
    <rect x="12" y="0" width="10" height="10" fill="#9CA3AF"/>
    <rect x="24" y="0" width="10" height="10" fill="#9CA3AF"/>
    <rect x="36" y="0" width="10" height="10" fill="#9CA3AF"/>
    <rect x="48" y="0" width="10" height="10" fill="#9CA3AF"/>
    <rect x="60" y="0" width="10" height="10" fill="#9CA3AF"/>
    <rect x="72" y="0" width="10" height="10" fill="#9CA3AF"/>
    <rect x="84" y="0" width="10" height="10" fill="#9CA3AF"/>
    <text x="47" y="25" font-size="11" text-anchor="middle" fill="#111827">1/8 cores active</text>
  </g>
  <text x="175" y="320" font-size="13" text-anchor="middle" fill="#111827">O(T) — cannot parallelize</text>

  <!-- Right Panel -->
  <rect x="350" y="0" width="350" height="350" fill="#F0FAFB"/>
  <text x="525" y="40" font-size="18" font-weight="bold" text-anchor="middle" fill="#0D9488">Parallel Processing</text>
  
  <g transform="translate(480, 80)">
    <!-- Web of connections -->
    <path d="M 17 50 L 17 30" fill="none" stroke="#0D9488" stroke-width="1" marker-end="url(#arrow_teal)"/>
    
    <path d="M 17 90 L 17 70" fill="none" stroke="#0D9488" stroke-width="1" marker-end="url(#arrow_teal)"/>
    <path d="M 17 90 Q -20 60 17 30" fill="none" stroke="#0D9488" stroke-width="1" marker-end="url(#arrow_teal)"/>
    
    <path d="M 17 130 L 17 110" fill="none" stroke="#0D9488" stroke-width="1" marker-end="url(#arrow_teal)"/>
    <path d="M 17 130 Q -30 100 17 70" fill="none" stroke="#0D9488" stroke-width="1" marker-end="url(#arrow_teal)"/>
    <path d="M 17 130 Q -40 80 17 30" fill="none" stroke="#0D9488" stroke-width="1" marker-end="url(#arrow_teal)"/>

    <path d="M 17 170 L 17 150" fill="none" stroke="#0D9488" stroke-width="1" marker-end="url(#arrow_teal)"/>
    <path d="M 17 170 Q -40 140 17 110" fill="none" stroke="#0D9488" stroke-width="1" marker-end="url(#arrow_teal)"/>
    <path d="M 17 170 Q -50 120 17 70" fill="none" stroke="#0D9488" stroke-width="1" marker-end="url(#arrow_teal)"/>
    <path d="M 17 170 Q -60 100 17 30" fill="none" stroke="#0D9488" stroke-width="1" marker-end="url(#arrow_teal)"/>

    <!-- Boxes -->
    <rect x="0" y="0" width="35" height="30" rx="5" fill="#E5E7EB" stroke="#374151"/><text x="17" y="19" font-size="12" text-anchor="middle">x1</text>
    <rect x="0" y="40" width="35" height="30" rx="5" fill="#E5E7EB" stroke="#374151"/><text x="17" y="59" font-size="12" text-anchor="middle">x2</text>
    <rect x="0" y="80" width="35" height="30" rx="5" fill="#E5E7EB" stroke="#374151"/><text x="17" y="99" font-size="12" text-anchor="middle">x3</text>
    <rect x="0" y="120" width="35" height="30" rx="5" fill="#E5E7EB" stroke="#374151"/><text x="17" y="139" font-size="12" text-anchor="middle">x4</text>
    <rect x="0" y="160" width="35" height="30" rx="5" fill="#E5E7EB" stroke="#374151"/><text x="17" y="179" font-size="12" text-anchor="middle">x5</text>
  </g>

  <g transform="translate(480, 290)">
    <rect x="0" y="0" width="10" height="10" fill="#22C55E"/>
    <rect x="12" y="0" width="10" height="10" fill="#22C55E"/>
    <rect x="24" y="0" width="10" height="10" fill="#22C55E"/>
    <rect x="36" y="0" width="10" height="10" fill="#22C55E"/>
    <rect x="48" y="0" width="10" height="10" fill="#22C55E"/>
    <rect x="60" y="0" width="10" height="10" fill="#22C55E"/>
    <rect x="72" y="0" width="10" height="10" fill="#22C55E"/>
    <rect x="84" y="0" width="10" height="10" fill="#22C55E"/>
    <text x="47" y="25" font-size="11" text-anchor="middle" fill="#111827">8/8 cores active</text>
  </g>
  <text x="525" y="340" font-size="13" text-anchor="middle" fill="#111827">O(1) parallel steps</text>

  <!-- Divider -->
  <line x1="350" y1="0" x2="350" y2="350" stroke="#9CA3AF" stroke-width="2"/>
  <circle cx="350" cy="175" r="15" fill="#fff" stroke="#9CA3AF" stroke-width="2"/>
  <text x="350" y="179" font-size="12" font-style="italic" text-anchor="middle" fill="#4B5563">vs.</text>
</svg>
