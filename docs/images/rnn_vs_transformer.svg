<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%" style="background-color: #0d1117; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <style>
    .title-rnn { font-size: 16px; font-weight: bold; fill: #d97706; text-anchor: middle; }
    .title-attn { font-size: 16px; font-weight: bold; fill: #2ea043; text-anchor: middle; }
    .sub-text { font-size: 11px; fill: #8b949e; text-anchor: middle; }
    .rnn-arrow { stroke: #d97706; stroke-width: 2; marker-end: url(#arrow-rnn); fill: none; }
    .attn-arrow { stroke: #2ea043; stroke-width: 1.5; marker-end: url(#arrow-attn); fill: none; opacity: 0.6; }
    .word-box { fill: #21262d; stroke: #30363d; stroke-width: 1.5; rx: 4; }
    .word-text { font-size: 12px; fill: #c9d1d9; text-anchor: middle; }
  </style>

  <defs>
    <marker id="arrow-rnn" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#d97706" />
    </marker>
    <marker id="arrow-attn" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2ea043" />
    </marker>
  </defs>

  <!-- Divider -->
  <line x1="350" y1="20" x2="350" y2="330" stroke="#30363d" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="350" y="180" class="sub-text" style="font-size: 14px; font-weight: bold; fill: #8b949e; background: #0d1117;">VS.</text>

  <!-- LEFT PANEL: RNN -->
  <text x="175" y="40" class="title-rnn">Sequential Processing</text>

  <!-- Words -->
  <g transform="translate(15, 120)">
    <rect x="0" y="0" width="40" height="30" class="word-box"/><text x="20" y="20" class="word-text">x1</text>
    <line x1="40" y1="15" x2="65" y2="15" class="rnn-arrow"/>
    <rect x="70" y="0" width="40" height="30" class="word-box"/><text x="90" y="20" class="word-text">x2</text>
    <line x1="110" y1="15" x2="135" y2="15" class="rnn-arrow"/>
    <rect x="140" y="0" width="40" height="30" class="word-box"/><text x="160" y="20" class="word-text">x3</text>
    <line x1="180" y1="15" x2="205" y2="15" class="rnn-arrow"/>
    <rect x="210" y="0" width="40" height="30" class="word-box"/><text x="230" y="20" class="word-text">x4</text>
    <line x1="250" y1="15" x2="275" y2="15" class="rnn-arrow"/>
    <rect x="280" y="0" width="40" height="30" class="word-box"/><text x="300" y="20" class="word-text">x5</text>
    
    <!-- Hidden States -->
    <path d="M 20 -5 Q 55 -30 90 -5" class="rnn-arrow"/>
    <text x="55" y="-20" class="sub-text" style="fill:#d97706;">h1</text>
    <path d="M 90 -5 Q 125 -30 160 -5" class="rnn-arrow"/>
    <text x="125" y="-20" class="sub-text" style="fill:#d97706;">h2</text>
    <path d="M 160 -5 Q 195 -30 230 -5" class="rnn-arrow"/>
    <text x="195" y="-20" class="sub-text" style="fill:#d97706;">h3</text>
    <path d="M 230 -5 Q 265 -30 300 -5" class="rnn-arrow"/>
    <text x="265" y="-20" class="sub-text" style="fill:#d97706;">h4</text>
  </g>

  <!-- GPU Icon -->
  <g transform="translate(115, 230)">
    <rect x="0" y="0" width="120" height="40" rx="4" fill="#161b22" stroke="#30363d" stroke-width="2"/>
    <!-- Cores -->
    <rect x="10" y="10" width="20" height="20" fill="#d97706"/>
    <rect x="35" y="10" width="20" height="20" fill="#30363d"/>
    <rect x="60" y="10" width="20" height="20" fill="#30363d"/>
    <rect x="85" y="10" width="20" height="20" fill="#30363d"/>
    <text x="60" y="55" class="sub-text">1/4 Cores Active</text>
  </g>

  <text x="175" y="320" class="sub-text" style="fill:#c9d1d9; font-weight:bold;">O(T) — cannot parallelize</text>

  <!-- RIGHT PANEL: Transformer -->
  <text x="525" y="40" class="title-attn">Parallel Processing</text>

  <!-- Words -->
  <g transform="translate(435, 70)">
    <rect x="60" y="0" width="40" height="30" class="word-box"/><text x="80" y="20" class="word-text">x1</text>
    <rect x="60" y="40" width="40" height="30" class="word-box"/><text x="80" y="60" class="word-text">x2</text>
    <rect x="60" y="80" width="40" height="30" class="word-box"/><text x="80" y="100" class="word-text">x3</text>
    <rect x="60" y="120" width="40" height="30" class="word-box"/><text x="80" y="140" class="word-text">x4</text>
    <rect x="60" y="160" width="40" height="30" class="word-box"/><text x="80" y="180" class="word-text">x5</text>
    
    <!-- Attention paths (all to all) -->
    <path d="M 50 15 Q 10 35 50 55" class="attn-arrow"/>
    <path d="M 50 15 Q -10 55 50 95" class="attn-arrow"/>
    <path d="M 50 15 Q -30 75 50 135" class="attn-arrow"/>
    <path d="M 50 15 Q -50 95 50 175" class="attn-arrow"/>
    
    <path d="M 50 55 Q 20 75 50 95" class="attn-arrow"/>
    <path d="M 50 55 Q 0 95 50 135" class="attn-arrow"/>
    <path d="M 50 55 Q -20 115 50 175" class="attn-arrow"/>
    
    <path d="M 50 95 Q 20 115 50 135" class="attn-arrow"/>
    <path d="M 50 95 Q 0 135 50 175" class="attn-arrow"/>
    
    <path d="M 50 135 Q 20 155 50 175" class="attn-arrow"/>
    
    <!-- Self loops -->
    <path d="M 110 15 C 130 0, 130 30, 110 15" class="attn-arrow"/>
    <path d="M 110 55 C 130 40, 130 70, 110 55" class="attn-arrow"/>
    <path d="M 110 95 C 130 80, 130 110, 110 95" class="attn-arrow"/>
    <path d="M 110 135 C 130 120, 130 150, 110 135" class="attn-arrow"/>
    <path d="M 110 175 C 130 160, 130 190, 110 175" class="attn-arrow"/>
  </g>

  <!-- GPU Icon -->
  <g transform="translate(465, 270)">
    <rect x="0" y="0" width="120" height="40" rx="4" fill="#161b22" stroke="#30363d" stroke-width="2"/>
    <!-- Cores -->
    <rect x="10" y="10" width="20" height="20" fill="#2ea043"/>
    <rect x="35" y="10" width="20" height="20" fill="#2ea043"/>
    <rect x="60" y="10" width="20" height="20" fill="#2ea043"/>
    <rect x="85" y="10" width="20" height="20" fill="#2ea043"/>
    <text x="60" y="-10" class="sub-text">4/4 Cores Active</text>
  </g>

  <text x="525" y="340" class="sub-text" style="fill:#c9d1d9; font-weight:bold;">O(1) parallel steps — full GPU utilization</text>
</svg>
