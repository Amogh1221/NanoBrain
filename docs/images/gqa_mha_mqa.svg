<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="100%" height="100%" style="background-color: #0d1117; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <style>
    .title { font-size: 18px; font-weight: bold; fill: #58a6ff; text-anchor: middle; }
    .col-title { font-size: 14px; font-weight: bold; fill: #ffffff; text-anchor: middle; }
    .sub-text { font-size: 11px; fill: #8b949e; text-anchor: middle; }
  </style>

  <rect width="100%" height="100%" fill="#0d1117"/>
  <text x="450" y="35" class="title">Attention Head Comparison: MHA vs. GQA vs. MQA</text>

  <!-- MHA -->
  <rect x="40" y="65" width="250" height="300" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="165" y="95" class="col-title">Multi-Head (MHA)</text>
  <text x="165" y="115" class="sub-text">GPT-2 / NanoBrain (1:1 Ratio)</text>
  <text x="165" y="145" class="sub-text" style="fill:#58a6ff;">Queries (Q): 12 Heads</text>
  <text x="165" y="165" class="sub-text" style="fill:#f1c40f;">Keys/Values (K/V): 12 Heads</text>
  <text x="165" y="330" class="sub-text" style="fill:#f85149;">Full KV Cache VRAM Footprint</text>

  <!-- GQA -->
  <rect x="325" y="65" width="250" height="300" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
  <text x="450" y="95" class="col-title" style="fill:#3fb950;">Grouped-Query (GQA)</text>
  <text x="450" y="115" class="sub-text">LLaMA 3 / Modern Standard</text>
  <text x="450" y="145" class="sub-text" style="fill:#58a6ff;">Queries (Q): 4 Heads (per group)</text>
  <text x="450" y="165" class="sub-text" style="fill:#f1c40f;">Keys/Values (K/V): 2 Shared Groups</text>
  <text x="450" y="330" class="sub-text" style="fill:#7ee787; font-weight:bold;">Slashes KV Cache VRAM by 75%</text>

  <!-- MQA -->
  <rect x="610" y="65" width="250" height="300" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="735" y="95" class="col-title">Multi-Query (MQA)</text>
  <text x="735" y="115" class="sub-text">Falcon / Chat Models</text>
  <text x="735" y="145" class="sub-text" style="fill:#58a6ff;">Queries (Q): 12 Heads</text>
  <text x="735" y="165" class="sub-text" style="fill:#f1c40f;">Keys/Values (K/V): 1 Single Head</text>
  <text x="735" y="330" class="sub-text" style="fill:#e67e22;">Ultra-low Memory (Quality Risk)</text>

</svg>
