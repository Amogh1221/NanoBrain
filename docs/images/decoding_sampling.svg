<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" width="100%" height="100%" style="background-color: #0d1117; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <style>
    .title { font-size: 20px; font-weight: bold; fill: #58a6ff; text-anchor: middle; }
    .box-title { font-size: 14px; font-weight: bold; fill: #ffffff; text-anchor: middle; }
    .box-text { font-size: 12px; fill: #c9d1d9; text-anchor: middle; }
    .arrow { stroke: #58a6ff; stroke-width: 2; marker-end: url(#arrowhead); fill: none; }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#58a6ff" />
    </marker>
  </defs>

  <text x="450" y="30" class="title">Decoding &amp; Sampling Methods Pipeline</text>

  <!-- Stage 1: Logits -->
  <rect x="375" y="60" width="150" height="40" rx="6" fill="#21262d" stroke="#30363d" stroke-width="2"/>
  <text x="450" y="85" class="box-title" style="fill:#58a6ff;">Raw Logits z</text>

  <line x1="450" y1="100" x2="450" y2="130" class="arrow"/>

  <!-- Stage 2: Temperature -->
  <rect x="350" y="130" width="200" height="40" rx="6" fill="#1f6feb" stroke="#388bfd" stroke-width="1.5"/>
  <text x="450" y="155" class="box-title">Temperature Scaling (T)</text>

  <line x1="450" y1="170" x2="450" y2="200" class="arrow"/>

  <!-- Stage 3: Softmax -->
  <rect x="375" y="200" width="150" height="40" rx="6" fill="#d97706" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="450" y="225" class="box-title">Softmax</text>

  <line x1="450" y1="240" x2="450" y2="270" class="arrow"/>

  <!-- Stage 4: Probabilities -->
  <rect x="350" y="270" width="200" height="40" rx="6" fill="#2ea043" stroke="#3fb950" stroke-width="1.5"/>
  <text x="450" y="295" class="box-title">Probabilities P(x)</text>

  <!-- Branching Arrows -->
  <path d="M 450 310 L 450 330 L 150 330 L 150 360" class="arrow"/>
  <path d="M 450 310 L 450 360" class="arrow"/>
  <path d="M 450 310 L 450 330 L 750 330 L 750 360" class="arrow"/>

  <!-- Branches -->
  <!-- Greedy -->
  <rect x="50" y="360" width="200" height="60" rx="8" fill="#21262d" stroke="#f85149" stroke-width="1.5"/>
  <text x="150" y="385" class="box-title" style="fill:#f85149;">Greedy Search</text>
  <text x="150" y="405" class="box-text">Pick max(P). Argmax.</text>

  <!-- Top-K -->
  <rect x="350" y="360" width="200" height="60" rx="8" fill="#21262d" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="450" y="385" class="box-title" style="fill:#58a6ff;">Top-K Sampling</text>
  <text x="450" y="405" class="box-text">Truncate to top K tokens</text>

  <!-- Top-p -->
  <rect x="650" y="360" width="200" height="60" rx="8" fill="#21262d" stroke="#8957e5" stroke-width="1.5"/>
  <text x="750" y="385" class="box-title" style="fill:#8957e5;">Top-p (Nucleus)</text>
  <text x="750" y="405" class="box-text">Cumulative prob p</text>

</svg>
