<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" style="background-color: white; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;">
  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#000"/></marker>
  </defs>

  <text x="400" y="40" font-size="20" font-weight="bold" text-anchor="middle" fill="#111827">Nucleus (Top-p) vs. Top-K Sampling</text>

  <!-- Top-K Panel -->
  <g transform="translate(50, 100)">
    <text x="150" y="0" font-size="16" font-weight="bold" text-anchor="middle">Top-K Sampling (K=3)</text>
    
    <!-- Axes -->
    <line x1="20" y1="200" x2="320" y2="200" stroke="#000" stroke-width="2"/>
    <line x1="20" y1="200" x2="20" y2="20" stroke="#000" stroke-width="2"/>
    <text x="170" y="230" font-size="12" text-anchor="middle">Vocabulary sorted by probability</text>
    <text x="-10" y="110" font-size="12" text-anchor="middle" transform="rotate(-90 -10 110)">Probability</text>

    <!-- Bars -->
    <rect x="40" y="40" width="20" height="160" fill="#3B82F6"/>
    <rect x="70" y="80" width="20" height="120" fill="#3B82F6"/>
    <rect x="100" y="120" width="20" height="80" fill="#3B82F6"/>
    
    <rect x="130" y="150" width="20" height="50" fill="#E5E7EB"/>
    <rect x="160" y="170" width="20" height="30" fill="#E5E7EB"/>
    <rect x="190" y="180" width="20" height="20" fill="#E5E7EB"/>
    <rect x="220" y="190" width="20" height="10" fill="#E5E7EB"/>

    <!-- Cutoff line -->
    <line x1="125" y1="20" x2="125" y2="200" stroke="#EF4444" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="125" y="10" font-size="12" font-weight="bold" fill="#EF4444" text-anchor="middle">K=3</text>
    
    <text x="80" y="50" font-size="12" fill="#1D4ED8" text-anchor="middle">Included</text>
    <text x="220" y="160" font-size="12" fill="#6B7280" text-anchor="middle">Truncated</text>
  </g>

  <!-- Top-P Panel -->
  <g transform="translate(450, 100)">
    <text x="150" y="0" font-size="16" font-weight="bold" text-anchor="middle">Nucleus Sampling (p=0.9)</text>
    
    <!-- Axes -->
    <line x1="20" y1="200" x2="320" y2="200" stroke="#000" stroke-width="2"/>
    <line x1="20" y1="200" x2="20" y2="20" stroke="#000" stroke-width="2"/>
    <text x="170" y="230" font-size="12" text-anchor="middle">Vocabulary sorted by probability</text>
    <text x="-10" y="110" font-size="12" text-anchor="middle" transform="rotate(-90 -10 110)">Probability</text>

    <!-- Curve for cumulative -->
    <path d="M 20 200 Q 50 200 100 100 T 200 40 T 320 20" fill="none" stroke="#F59E0B" stroke-width="2"/>
    <text x="250" y="30" font-size="12" fill="#D97706">CDF</text>
    
    <!-- Threshold line for p=0.9 -->
    <line x1="20" y1="40" x2="320" y2="40" stroke="#10B981" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="325" y="45" font-size="12" font-weight="bold" fill="#10B981">p=0.9</text>

    <!-- Bars -->
    <rect x="40" y="40" width="20" height="160" fill="#3B82F6"/>
    <rect x="70" y="80" width="20" height="120" fill="#3B82F6"/>
    <rect x="100" y="120" width="20" height="80" fill="#3B82F6"/>
    <rect x="130" y="150" width="20" height="50" fill="#3B82F6"/>
    <rect x="160" y="170" width="20" height="30" fill="#3B82F6"/>
    <rect x="190" y="180" width="20" height="20" fill="#E5E7EB"/>
    <rect x="220" y="190" width="20" height="10" fill="#E5E7EB"/>

    <!-- Cutoff line drop -->
    <line x1="185" y1="40" x2="185" y2="200" stroke="#10B981" stroke-width="1.5" stroke-dasharray="2,2"/>
    
    <!-- Sum area -->
    <path d="M 40 100 Q 110 50 185 80" fill="none" stroke="#1D4ED8" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="110" y="40" font-size="12" fill="#1D4ED8" text-anchor="middle">Sum = 0.9</text>
  </g>
</svg>
