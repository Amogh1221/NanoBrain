<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 370" width="780" height="370" style="background-color: white; font-family: sans-serif;">
  
  <line x1="260" y1="20" x2="260" y2="350" stroke="#D1D5DB" stroke-width="1"/>
  <line x1="520" y1="20" x2="520" y2="350" stroke="#D1D5DB" stroke-width="1"/>

  <!-- PANEL 1: Temperature Scaling -->
  <text x="130" y="40" font-size="16" font-weight="bold" text-anchor="middle" fill="#111827">Temperature Scaling</text>
  
  <line x1="30" y1="300" x2="240" y2="300" stroke="#374151" stroke-width="2"/>
  <text x="50" y="315" font-size="10" text-anchor="middle">T1</text>
  <text x="80" y="315" font-size="10" text-anchor="middle">T2</text>
  <text x="110" y="315" font-size="10" text-anchor="middle">T3</text>
  <text x="140" y="315" font-size="10" text-anchor="middle">T4</text>
  <text x="170" y="315" font-size="10" text-anchor="middle">T5</text>
  <text x="200" y="315" font-size="10" text-anchor="middle">T6</text>

  <!-- T=0.2 Dark Blue -->
  <rect x="40" y="80" width="20" height="220" fill="#1E3A8A" opacity="0.8"/>
  <rect x="70" y="295" width="20" height="5" fill="#1E3A8A" opacity="0.8"/>
  <rect x="100" y="298" width="20" height="2" fill="#1E3A8A" opacity="0.8"/>
  
  <!-- T=1.0 Medium Teal -->
  <rect x="40" y="140" width="20" height="160" fill="#0D9488" opacity="0.8"/>
  <rect x="70" y="220" width="20" height="80" fill="#0D9488" opacity="0.8"/>
  <rect x="100" y="260" width="20" height="40" fill="#0D9488" opacity="0.8"/>
  <rect x="130" y="280" width="20" height="20" fill="#0D9488" opacity="0.8"/>
  <rect x="160" y="285" width="20" height="15" fill="#0D9488" opacity="0.8"/>
  <rect x="190" y="290" width="20" height="10" fill="#0D9488" opacity="0.8"/>

  <!-- T=1.5 Light Green -->
  <rect x="40" y="200" width="20" height="100" fill="#86EFAC" opacity="0.8"/>
  <rect x="70" y="220" width="20" height="80" fill="#86EFAC" opacity="0.8"/>
  <rect x="100" y="240" width="20" height="60" fill="#86EFAC" opacity="0.8"/>
  <rect x="130" y="250" width="20" height="50" fill="#86EFAC" opacity="0.8"/>
  <rect x="160" y="255" width="20" height="45" fill="#86EFAC" opacity="0.8"/>
  <rect x="190" y="260" width="20" height="40" fill="#86EFAC" opacity="0.8"/>

  <rect x="140" y="60" width="100" height="60" rx="5" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1"/>
  <rect x="150" y="70" width="10" height="10" fill="#1E3A8A"/> <text x="165" y="79" font-size="10">T=0.2</text>
  <rect x="150" y="85" width="10" height="10" fill="#0D9488"/> <text x="165" y="94" font-size="10">T=1.0</text>
  <rect x="150" y="100" width="10" height="10" fill="#86EFAC"/> <text x="165" y="109" font-size="10">T=1.5</text>

  <!-- PANEL 2: Top-K -->
  <text x="390" y="40" font-size="16" font-weight="bold" text-anchor="middle" fill="#111827">Top-K Sampling (K=3)</text>
  
  <line x1="290" y1="300" x2="500" y2="300" stroke="#374151" stroke-width="2"/>
  <text x="310" y="315" font-size="10" text-anchor="middle">T1</text>
  <text x="340" y="315" font-size="10" text-anchor="middle">T2</text>
  <text x="370" y="315" font-size="10" text-anchor="middle">T3</text>
  <text x="400" y="315" font-size="10" text-anchor="middle">T4</text>
  <text x="430" y="315" font-size="10" text-anchor="middle">T5</text>
  <text x="460" y="315" font-size="10" text-anchor="middle">T6</text>

  <rect x="300" y="140" width="20" height="160" fill="#0D9488"/>
  <rect x="330" y="220" width="20" height="80" fill="#0D9488"/>
  <rect x="360" y="260" width="20" height="40" fill="#0D9488"/>

  <g opacity="0.4">
    <rect x="390" y="280" width="20" height="20" fill="#6B7280"/>
    <line x1="390" y1="280" x2="410" y2="300" stroke="#000" stroke-width="1"/>
    <line x1="410" y1="280" x2="390" y2="300" stroke="#000" stroke-width="1"/>
    
    <rect x="420" y="285" width="20" height="15" fill="#6B7280"/>
    <line x1="420" y1="285" x2="440" y2="300" stroke="#000" stroke-width="1"/>
    <line x1="440" y1="285" x2="420" y2="300" stroke="#000" stroke-width="1"/>
    
    <rect x="450" y="290" width="20" height="10" fill="#6B7280"/>
    <line x1="450" y1="290" x2="470" y2="300" stroke="#000" stroke-width="1"/>
    <line x1="470" y1="290" x2="450" y2="300" stroke="#000" stroke-width="1"/>
  </g>

  <line x1="385" y1="120" x2="385" y2="320" stroke="#111827" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="385" y="110" font-size="12" font-weight="bold" text-anchor="middle" fill="#111827">K=3 cutoff</text>

  <path d="M 300 130 L 300 120 L 380 120 L 380 130" fill="none" stroke="#0D9488" stroke-width="2"/>
  <text x="340" y="110" font-size="12" font-weight="bold" text-anchor="middle" fill="#0D9488">✓ Kept</text>

  <path d="M 390 270 L 390 260 L 470 260 L 470 270" fill="none" stroke="#6B7280" stroke-width="2"/>
  <text x="430" y="250" font-size="12" font-weight="bold" text-anchor="middle" fill="#6B7280">✗ Masked</text>

  <!-- PANEL 3: Top-p -->
  <text x="650" y="40" font-size="16" font-weight="bold" text-anchor="middle" fill="#111827">Top-p Nucleus (p=0.80)</text>

  <line x1="550" y1="300" x2="760" y2="300" stroke="#374151" stroke-width="2"/>
  <text x="570" y="315" font-size="10" text-anchor="middle">T1</text>
  <text x="600" y="315" font-size="10" text-anchor="middle">T2</text>
  <text x="630" y="315" font-size="10" text-anchor="middle">T3</text>
  <text x="660" y="315" font-size="10" text-anchor="middle">T4</text>
  <text x="690" y="315" font-size="10" text-anchor="middle">T5</text>
  <text x="720" y="315" font-size="10" text-anchor="middle">T6</text>

  <rect x="560" y="140" width="20" height="160" fill="#0D9488"/>
  <rect x="590" y="220" width="20" height="80" fill="#0D9488"/>
  <rect x="620" y="260" width="20" height="40" fill="#0D9488"/>
  <rect x="650" y="280" width="20" height="20" fill="#0D9488"/>

  <g opacity="0.4">
    <rect x="680" y="285" width="20" height="15" fill="#6B7280"/>
    <rect x="710" y="290" width="20" height="10" fill="#6B7280"/>
  </g>

  <!-- p=0.80 line -->
  <line x1="540" y1="120" x2="760" y2="120" stroke="#EF4444" stroke-width="2" stroke-dasharray="5,5"/>
  
  <defs>
    <marker id="arrow_red" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#EF4444"/></marker>
  </defs>
  <line x1="700" y1="90" x2="670" y2="120" stroke="#EF4444" stroke-width="2" marker-end="url(#arrow_red)"/>
  <text x="710" y="85" font-size="12" font-weight="bold" fill="#EF4444">p=0.80 threshold</text>

  <!-- Cumulative Line -->
  <!-- 0 -> 160(48%), -> 240(72%), -> 280(84%), -> 300(90%) -->
  <polyline points="550,300 570,180 600,100 630,60 660,40 690,30 720,25" fill="none" stroke="#F97316" stroke-width="3"/>
  <circle cx="570" cy="180" r="4" fill="#F97316"/>
  <circle cx="600" cy="100" r="4" fill="#F97316"/>
  <circle cx="630" cy="60" r="4" fill="#F97316"/>
  <circle cx="660" cy="40" r="4" fill="#F97316"/>

</svg>
