<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 420" width="660" height="420" style="background-color: white; font-family: sans-serif;">
  <!-- Gridlines -->
  <line x1="80" y1="60" x2="620" y2="60" stroke="#E5E7EB" stroke-width="1"/>
  <text x="70" y="64" font-size="11" text-anchor="end" fill="#6B7280">1600</text>
  <line x1="80" y1="130" x2="620" y2="130" stroke="#E5E7EB" stroke-width="1"/>
  <text x="70" y="134" font-size="11" text-anchor="end" fill="#6B7280">1200</text>
  <line x1="80" y1="200" x2="620" y2="200" stroke="#E5E7EB" stroke-width="1"/>
  <text x="70" y="204" font-size="11" text-anchor="end" fill="#6B7280">800</text>
  <line x1="80" y1="270" x2="620" y2="270" stroke="#E5E7EB" stroke-width="1"/>
  <text x="70" y="274" font-size="11" text-anchor="end" fill="#6B7280">400</text>
  
  <line x1="80" y1="340" x2="620" y2="340" stroke="#374151" stroke-width="2"/>
  <line x1="80" y1="60" x2="80" y2="340" stroke="#374151" stroke-width="2"/>
  
  <!-- Labels -->
  <text x="350" y="380" font-size="13" font-weight="bold" text-anchor="middle" fill="#111827">Context Length T (tokens)</text>
  <text x="30" y="200" font-size="13" font-weight="bold" text-anchor="middle" fill="#111827" transform="rotate(-90 30 200)">KV Cache Memory (MB)</text>

  <!-- Red Limit Line -->
  <line x1="80" y1="75" x2="620" y2="75" stroke="#EF4444" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="350" y="70" font-size="11" text-anchor="middle" fill="#EF4444">~GPU VRAM limit (model weights already use most VRAM)</text>

  <!-- Bars (Max H = 280 (1600MB)) -->
  <!-- T=256 (X=140) -->
  <text x="140" y="355" font-size="11" text-anchor="middle" fill="#111827">256</text>
  <rect x="120" y="338" width="12" height="2" fill="#3B82F6"/> <!-- MHA: 6MB = 1px -->
  <rect x="134" y="339.5" width="12" height="0.5" fill="#F97316"/>
  <rect x="148" y="339.8" width="12" height="0.2" fill="#22C55E"/>

  <!-- T=512 (X=240) -->
  <text x="240" y="355" font-size="11" text-anchor="middle" fill="#111827">512</text>
  <rect x="220" y="337" width="12" height="3" fill="#3B82F6"/> <!-- MHA: 12MB = 2px -->
  <rect x="234" y="339" width="12" height="1" fill="#F97316"/>
  <rect x="248" y="339.5" width="12" height="0.5" fill="#22C55E"/>

  <!-- T=1024 (X=340) -->
  <text x="340" y="355" font-size="11" text-anchor="middle" fill="#111827">1024</text>
  <rect x="320" y="335" width="12" height="5" fill="#3B82F6"/> <!-- MHA: 24MB = 4px -->
  <rect x="334" y="339" width="12" height="1" fill="#F97316"/>
  <rect x="348" y="339.5" width="12" height="0.5" fill="#22C55E"/>

  <!-- T=2048 (X=440) -->
  <text x="440" y="355" font-size="11" text-anchor="middle" fill="#111827">2048</text>
  <rect x="420" y="331" width="12" height="9" fill="#3B82F6"/> <!-- MHA: 48MB = 8px -->
  <rect x="434" y="338" width="12" height="2" fill="#F97316"/>
  <rect x="448" y="339" width="12" height="1" fill="#22C55E"/>

  <!-- T=4096 (X=540) -->
  <text x="540" y="355" font-size="11" text-anchor="middle" fill="#111827">4096</text>
  <rect x="520" y="323" width="12" height="17" fill="#3B82F6"/> <!-- MHA: 96MB = 17px -->
  <rect x="534" y="337" width="12" height="3" fill="#F97316"/>
  <rect x="548" y="338.5" width="12" height="1.5" fill="#22C55E"/>

  <!-- Formula note -->
  <text x="350" y="400" font-size="10" text-anchor="middle" fill="#4B5563">Memory = 2 × B × n_layers × n_heads × d_k × T × 2 bytes (FP16)</text>
  <text x="350" y="415" font-size="10" text-anchor="middle" fill="#4B5563">NanoBrain B=1: T=1024 → 24MB  |  T=4096, B=16 → 1,536MB</text>

  <!-- Legend -->
  <rect x="90" y="20" width="150" height="60" rx="5" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1"/>
  <rect x="100" y="30" width="10" height="10" fill="#3B82F6"/>
  <text x="115" y="39" font-size="10" fill="#111827">MHA (n_kv_heads=12)</text>
  <rect x="100" y="45" width="10" height="10" fill="#F97316"/>
  <text x="115" y="54" font-size="10" fill="#111827">GQA (n_kv_heads=2)</text>
  <rect x="100" y="60" width="10" height="10" fill="#22C55E"/>
  <text x="115" y="69" font-size="10" fill="#111827">MQA (n_kv_heads=1)</text>

</svg>
