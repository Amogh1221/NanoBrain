<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 420" width="100%" height="100%" style="background-color: #0d1117; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <style>
    .title { font-size: 18px; font-weight: bold; fill: #58a6ff; text-anchor: middle; }
    .box-title { font-size: 13px; font-weight: bold; fill: #ffffff; text-anchor: middle; }
    .sub-text { font-size: 11px; fill: #8b949e; text-anchor: middle; }
  </style>

  <rect width="100%" height="100%" fill="#0d1117"/>
  <text x="375" y="35" class="title">KV Cache Memory Growth vs. Context Length T</text>

  <!-- Grid Bars -->
  <g transform="translate(100, 70)">
    <!-- Y Axis -->
    <line x1="0" y1="0" x2="0" y2="260" stroke="#30363d" stroke-width="2"/>
    <line x1="0" y1="260" x2="580" y2="260" stroke="#30363d" stroke-width="2"/>

    <!-- Y Ticks -->
    <text x="-15" y="265" class="sub-text">0 MB</text>
    <text x="-15" y="200" class="sub-text">100 MB</text>
    <text x="-15" y="135" class="sub-text">200 MB</text>
    <text x="-15" y="70" class="sub-text">300 MB</text>
    <text x="-15" y="10" class="sub-text">400 MB</text>

    <!-- Bars T = 256, 512, 1024, 2048, 4096 -->
    <!-- MHA (Blue), GQA (Green) -->
    <!-- T=256: MHA 24MB, GQA 6MB -->
    <rect x="40" y="244" width="25" height="16" fill="#1f6feb"/>
    <rect x="70" y="256" width="25" height="4" fill="#238636"/>
    <text x="65" y="280" class="sub-text">T=256</text>

    <!-- T=512: MHA 48MB, GQA 12MB -->
    <rect x="150" y="228" width="25" height="32" fill="#1f6feb"/>
    <rect x="180" y="252" width="25" height="8" fill="#238636"/>
    <text x="175" y="280" class="sub-text">T=512</text>

    <!-- T=1024: MHA 96MB, GQA 24MB -->
    <rect x="260" y="196" width="25" height="64" fill="#1f6feb"/>
    <rect x="290" y="244" width="25" height="16" fill="#238636"/>
    <text x="285" y="280" class="sub-text">T=1024</text>

    <!-- T=2048: MHA 192MB, GQA 48MB -->
    <rect x="370" y="132" width="25" height="128" fill="#1f6feb"/>
    <rect x="400" y="228" width="25" height="32" fill="#238636"/>
    <text x="395" y="280" class="sub-text">T=2048</text>

    <!-- T=4096: MHA 384MB, GQA 96MB -->
    <rect x="480" y="4" width="25" height="256" fill="#1f6feb"/>
    <rect x="510" y="196" width="25" height="64" fill="#238636"/>
    <text x="505" y="280" class="sub-text">T=4096</text>
  </g>

  <!-- Legend -->
  <rect x="200" y="370" width="18" height="12" fill="#1f6feb"/>
  <text x="225" y="381" class="sub-text" style="fill:#79c0ff; font-weight:bold;">MHA (12 KV Heads - NanoBrain)</text>

  <rect x="460" y="370" width="18" height="12" fill="#238636"/>
  <text x="485" y="381" class="sub-text" style="fill:#7ee787; font-weight:bold;">GQA (2 KV Groups - LLaMA 3)</text>

</svg>
