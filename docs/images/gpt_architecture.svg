<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 720" width="320" height="720" style="background-color: white; font-family: sans-serif;">
  <defs>
    <marker id="arrow_black" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#000000"/></marker>
  </defs>

  <g transform="translate(20, 0)">
    <!-- Box 1 -->
    <rect x="0" y="660" width="280" height="50" rx="5" fill="#F3F4F6" stroke="#374151" stroke-width="2"/>
    <text x="140" y="680" font-size="14" font-weight="bold" text-anchor="middle" fill="#111827">Input Token IDs</text>
    <text x="140" y="700" font-size="12" text-anchor="middle" fill="#111827">[x1, x2, …, xT]</text>

    <!-- Arrow Up -->
    <line x1="140" y1="660" x2="140" y2="610" stroke="#000" stroke-width="2" marker-end="url(#arrow_black)"/>
    <text x="150" y="640" font-size="12" font-weight="bold" fill="#111827">Lookup</text>

    <!-- Box 2 (Split) -->
    <rect x="0" y="550" width="125" height="50" rx="5" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
    <text x="62" y="580" font-size="11" font-weight="bold" text-anchor="middle" fill="#111827">Token Embedding W_te</text>
    
    <text x="140" y="580" font-size="20" font-weight="bold" text-anchor="middle" fill="#111827">+</text>
    
    <rect x="155" y="550" width="125" height="50" rx="5" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2"/>
    <text x="217" y="580" font-size="11" font-weight="bold" text-anchor="middle" fill="#111827">Pos. Embedding W_pe</text>

    <!-- Arrow Up -->
    <line x1="140" y1="550" x2="140" y2="520" stroke="#000" stroke-width="2" marker-end="url(#arrow_black)"/>

    <!-- Box 3 (Transformer Block) -->
    <rect x="0" y="270" width="280" height="240" rx="10" fill="#CCFBF1" stroke="#0D9488" stroke-width="3"/>
    <text x="140" y="295" font-size="16" font-weight="bold" text-anchor="middle" fill="#111827">Transformer Block</text>

    <!-- Sub A -->
    <rect x="20" y="320" width="40" height="40" rx="5" fill="#fff" stroke="#0D9488" stroke-width="2"/>
    <text x="40" y="345" font-size="12" font-weight="bold" text-anchor="middle">LN</text>
    
    <line x1="60" y1="340" x2="80" y2="340" stroke="#000" stroke-width="2" marker-end="url(#arrow_black)"/>
    
    <rect x="80" y="320" width="140" height="40" rx="5" fill="#fff" stroke="#0D9488" stroke-width="2"/>
    <text x="150" y="345" font-size="12" font-weight="bold" text-anchor="middle">Causal Self-Attention</text>
    
    <line x1="220" y1="340" x2="240" y2="340" stroke="#000" stroke-width="2" marker-end="url(#arrow_black)"/>
    
    <circle cx="255" cy="340" r="15" fill="#fff" stroke="#0D9488" stroke-width="2"/>
    <text x="255" y="345" font-size="14" font-weight="bold" text-anchor="middle">⊕</text>
    
    <!-- Residual A -->
    <path d="M 140 520 L 140 510 L 290 510 L 290 340 L 270 340" fill="none" stroke="#000" stroke-width="2" marker-end="url(#arrow_black)"/>
    <line x1="140" y1="510" x2="140" y2="360" stroke="#000" stroke-width="2" marker-end="url(#arrow_black)"/>
    
    <line x1="255" y1="325" x2="255" y2="295" stroke="#000" stroke-width="2"/>

    <!-- Sub B -->
    <rect x="20" y="420" width="40" height="40" rx="5" fill="#fff" stroke="#0D9488" stroke-width="2"/>
    <text x="40" y="445" font-size="12" font-weight="bold" text-anchor="middle">LN</text>
    
    <line x1="60" y1="440" x2="80" y2="440" stroke="#000" stroke-width="2" marker-end="url(#arrow_black)"/>
    
    <rect x="80" y="420" width="140" height="40" rx="5" fill="#fff" stroke="#0D9488" stroke-width="2"/>
    <text x="150" y="445" font-size="12" font-weight="bold" text-anchor="middle">MLP (4× expand)</text>
    
    <line x1="220" y1="440" x2="240" y2="440" stroke="#000" stroke-width="2" marker-end="url(#arrow_black)"/>
    
    <circle cx="255" cy="440" r="15" fill="#fff" stroke="#0D9488" stroke-width="2"/>
    <text x="255" y="445" font-size="14" font-weight="bold" text-anchor="middle">⊕</text>
    
    <!-- Residual B -->
    <path d="M 255 360 L 255 380 L 290 380 L 290 440 L 270 440" fill="none" stroke="#000" stroke-width="2" marker-end="url(#arrow_black)"/>
    <line x1="255" y1="360" x2="255" y2="420" stroke="#000" stroke-width="2" marker-end="url(#arrow_black)"/>

    <line x1="255" y1="455" x2="255" y2="500" stroke="#000" stroke-width="2"/>

    <!-- Curly Brace -->
    <path d="M 285 270 Q 295 270 295 390 T 305 390 Q 295 390 295 510 T 285 510" fill="none" stroke="#111827" stroke-width="2"/>
    <text x="315" y="395" font-size="16" font-weight="bold" fill="#111827">× 12</text>

    <!-- Arrow Up -->
    <line x1="140" y1="270" x2="140" y2="230" stroke="#000" stroke-width="2" marker-end="url(#arrow_black)"/>

    <!-- Box 4 -->
    <rect x="0" y="180" width="280" height="50" rx="5" fill="#F3F4F6" stroke="#374151" stroke-width="2"/>
    <text x="140" y="210" font-size="14" font-weight="bold" text-anchor="middle" fill="#111827">Final LayerNorm  ln_f</text>

    <!-- Arrow Up -->
    <line x1="140" y1="180" x2="140" y2="140" stroke="#000" stroke-width="2" marker-end="url(#arrow_black)"/>

    <!-- Box 5 -->
    <rect x="0" y="70" width="280" height="70" rx="5" fill="#DCFCE7" stroke="#16A34A" stroke-width="2"/>
    <text x="140" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#111827">Output Logits</text>
    <text x="140" y="120" font-size="14" text-anchor="middle" fill="#111827">(vocab = 50,258)</text>

    <!-- Weight Tying Line -->
    <path d="M 0 105 L -10 105 L -10 575 L 0 575" fill="none" stroke="#4B5563" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow_black)"/>
    <text x="-15" y="350" font-size="12" font-weight="bold" fill="#4B5563" transform="rotate(-90 -15 350)" text-anchor="middle">Weight Tying: lm_head.weight = W_te</text>
  </g>
</svg>
