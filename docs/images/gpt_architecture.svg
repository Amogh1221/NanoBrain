<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 850" width="100%" height="100%" style="background-color: #0d1117; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <style>
    .title { font-size: 20px; font-weight: bold; fill: #c9d1d9; text-anchor: middle; }
    .box-text { font-size: 14px; text-anchor: middle; font-weight: 600; }
    .box-text-dark { font-size: 14px; text-anchor: middle; font-weight: 600; fill: #000000; }
    .box-text-light { font-size: 14px; text-anchor: middle; font-weight: 600; fill: #ffffff; }
    .sub-text { font-size: 12px; fill: #8b949e; text-anchor: middle; }
    .arrow { stroke: #c9d1d9; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .dashed-arrow { stroke: #8b949e; stroke-width: 2; fill: none; stroke-dasharray: 5,5; marker-end: url(#arrowhead-grey); }
    .line { stroke: #c9d1d9; stroke-width: 2; fill: none; }
    .box { stroke-width: 1.5; rx: 6; }
    .add-circle { fill: #0d1117; stroke: #c9d1d9; stroke-width: 2; }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c9d1d9" />
    </marker>
    <marker id="arrowhead-grey" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b949e" />
    </marker>
  </defs>

  <text x="250" y="30" class="title">GPT-2 Decoder Block Architecture</text>

  <!-- Output Probabilities -->
  <text x="250" y="60" class="box-text-light">Output Probabilities</text>
  
  <!-- Softmax -->
  <rect x="170" y="80" width="160" height="40" fill="#2ea043" stroke="#3fb950" class="box"/>
  <text x="250" y="105" class="box-text-light">Softmax</text>

  <!-- Linear -->
  <rect x="170" y="150" width="160" height="40" fill="#21262d" stroke="#30363d" class="box"/>
  <text x="250" y="175" class="box-text-light">Linear</text>

  <!-- LayerNorm -->
  <rect x="170" y="220" width="160" height="40" fill="#e3b341" stroke="#d4a338" class="box"/>
  <text x="250" y="245" class="box-text-dark">LayerNorm</text>

  <!-- Transformer Block Background -->
  <rect x="70" y="290" width="360" height="420" fill="#161b22" stroke="#30363d" stroke-width="2" rx="10"/>
  <text x="420" y="315" class="sub-text" style="font-weight:bold; fill:#c9d1d9; text-anchor:end;">Transformer Block ×12</text>

  <!-- Inside Block -->
  
  <!-- Add & Norm 2 -->
  <circle cx="250" cy="330" r="15" class="add-circle"/>
  <line x1="242" y1="330" x2="258" y2="330" class="line"/>
  <line x1="250" y1="322" x2="250" y2="338" class="line"/>

  <!-- Feed Forward -->
  <rect x="160" y="375" width="180" height="40" fill="#1f6feb" stroke="#388bfd" class="box"/>
  <text x="250" y="400" class="box-text-light">Feed Forward</text>

  <!-- LayerNorm 2 -->
  <rect x="170" y="445" width="160" height="40" fill="#e3b341" stroke="#d4a338" class="box"/>
  <text x="250" y="470" class="box-text-dark">LayerNorm</text>

  <!-- Add & Norm 1 -->
  <circle cx="250" cy="530" r="15" class="add-circle"/>
  <line x1="242" y1="530" x2="258" y2="530" class="line"/>
  <line x1="250" y1="522" x2="250" y2="538" class="line"/>

  <!-- Masked Multi-Head Attention -->
  <rect x="130" y="575" width="240" height="40" fill="#d97706" stroke="#f59e0b" class="box"/>
  <text x="250" y="600" class="box-text-light">Masked Multi-Head Attention</text>

  <!-- LayerNorm 1 -->
  <rect x="170" y="645" width="160" height="40" fill="#e3b341" stroke="#d4a338" class="box"/>
  <text x="250" y="670" class="box-text-dark">LayerNorm</text>

  <!-- Embedding -->
  <rect x="120" y="730" width="260" height="40" fill="#d2a8ff" stroke="#bc8cff" class="box"/>
  <text x="250" y="755" class="box-text-dark">Token &amp; Positional Embedding</text>

  <!-- Input -->
  <text x="250" y="820" class="box-text-light">Inputs</text>

  <!-- Connecting Lines -->
  <!-- Input to Embedding -->
  <line x1="250" y1="800" x2="250" y2="770" class="arrow"/>
  
  <!-- Embedding to Split -->
  <line x1="250" y1="730" x2="250" y2="700" class="line"/>
  
  <!-- Split to Residual 1 -->
  <circle cx="250" cy="700" r="4" fill="#c9d1d9"/>
  <path d="M 250 700 L 100 700 L 100 530 L 235 530" class="arrow"/>
  
  <!-- Split to LayerNorm 1 -->
  <line x1="250" y1="700" x2="250" y2="685" class="arrow"/>
  
  <!-- LayerNorm 1 to Attention -->
  <line x1="250" y1="645" x2="250" y2="615" class="arrow"/>
  
  <!-- Attention to Add 1 -->
  <line x1="250" y1="575" x2="250" y2="545" class="arrow"/>

  <!-- Add 1 to Split 2 -->
  <line x1="250" y1="515" x2="250" y2="500" class="line"/>
  
  <!-- Split to Residual 2 -->
  <circle cx="250" cy="500" r="4" fill="#c9d1d9"/>
  <path d="M 250 500 L 100 500 L 100 330 L 235 330" class="arrow"/>

  <!-- Split 2 to LayerNorm 2 -->
  <line x1="250" y1="500" x2="250" y2="485" class="arrow"/>

  <!-- LayerNorm 2 to FF -->
  <line x1="250" y1="445" x2="250" y2="415" class="arrow"/>
  
  <!-- FF to Add 2 -->
  <line x1="250" y1="375" x2="250" y2="345" class="arrow"/>
  
  <!-- Add 2 to Output (LayerNorm Final) -->
  <line x1="250" y1="315" x2="250" y2="260" class="arrow"/>
  
  <!-- Final LayerNorm to Linear -->
  <line x1="250" y1="220" x2="250" y2="190" class="arrow"/>
  
  <!-- Linear to Softmax -->
  <line x1="250" y1="150" x2="250" y2="120" class="arrow"/>
  
  <!-- Softmax to Probabilities -->
  <line x1="250" y1="80" x2="250" y2="65" class="arrow"/>

  <!-- Weight Tying Line -->
  <path d="M 380 750 L 440 750 L 440 170 L 330 170" class="dashed-arrow"/>
  <text x="450" y="460" class="sub-text" style="transform: rotate(-90deg); transform-origin: 450px 460px;">Weight Tying: lm_head.weight = W_te</text>
  
</svg>
