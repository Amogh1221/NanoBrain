<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500" style="background-color: white; font-family: 'Times New Roman', serif;">
  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#000"/></marker>
  </defs>

  <!-- Scaled Dot-Product Attention (Left) -->
  <text x="130" y="40" font-size="16" font-weight="bold" text-anchor="middle" fill="#000">Scaled Dot-Product Attention</text>
  
  <g transform="translate(130, 420)">
    <!-- Inputs -->
    <text x="-40" y="30" font-size="16" font-style="italic" text-anchor="middle">V</text>
    <text x="0" y="30" font-size="16" font-style="italic" text-anchor="middle">K</text>
    <text x="40" y="30" font-size="16" font-style="italic" text-anchor="middle">Q</text>
    
    <line x1="-40" y1="10" x2="-40" y2="-280" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="0" y1="10" x2="0" y2="-40" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="40" y1="10" x2="40" y2="-40" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- MatMul 1 -->
    <rect x="-20" y="-70" width="80" height="30" rx="3" fill="#EAD1DC" stroke="#B08D9C" stroke-width="1.5"/>
    <text x="20" y="-50" font-size="14" text-anchor="middle">MatMul</text>
    <line x1="20" y1="-70" x2="20" y2="-100" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Scale -->
    <rect x="-10" y="-130" width="60" height="30" rx="3" fill="#FCE5CD" stroke="#DCA276" stroke-width="1.5"/>
    <text x="20" y="-110" font-size="14" text-anchor="middle">Scale</text>
    <line x1="20" y1="-130" x2="20" y2="-160" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Mask -->
    <rect x="-25" y="-190" width="90" height="30" rx="3" fill="#D9EAD3" stroke="#93C47D" stroke-width="1.5"/>
    <text x="20" y="-170" font-size="12" text-anchor="middle">Mask (opt.)</text>
    <line x1="20" y1="-190" x2="20" y2="-220" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Softmax -->
    <rect x="-15" y="-250" width="70" height="30" rx="3" fill="#D9EAD3" stroke="#93C47D" stroke-width="1.5"/>
    <text x="20" y="-230" font-size="14" text-anchor="middle">Softmax</text>
    <line x1="20" y1="-250" x2="20" y2="-280" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- MatMul 2 -->
    <rect x="-60" y="-310" width="100" height="30" rx="3" fill="#EAD1DC" stroke="#B08D9C" stroke-width="1.5"/>
    <text x="-10" y="-290" font-size="14" text-anchor="middle">MatMul</text>
    
    <line x1="-10" y1="-310" x2="-10" y2="-350" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
  </g>

  <!-- Multi-Head Attention (Right) -->
  <text x="430" y="40" font-size="16" font-weight="bold" text-anchor="middle" fill="#000">Multi-Head Attention</text>
  
  <g transform="translate(430, 420)">
    <text x="-60" y="30" font-size="16" font-style="italic" text-anchor="middle">V</text>
    <text x="0" y="30" font-size="16" font-style="italic" text-anchor="middle">K</text>
    <text x="60" y="30" font-size="16" font-style="italic" text-anchor="middle">Q</text>

    <!-- Base Lines -->
    <line x1="-60" y1="10" x2="-60" y2="-40" stroke="#000" stroke-width="1.5"/>
    <line x1="0" y1="10" x2="0" y2="-40" stroke="#000" stroke-width="1.5"/>
    <line x1="60" y1="10" x2="60" y2="-40" stroke="#000" stroke-width="1.5"/>
    
    <!-- Split lines h times -->
    <!-- Q -->
    <path d="M 60 -40 L 40 -50 L 40 -70" fill="none" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
    <path d="M 60 -40 L 80 -50 L 80 -70" fill="none" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
    <circle cx="60" cy="-60" r="1" fill="#000"/> <circle cx="64" cy="-60" r="1" fill="#000"/> <circle cx="56" cy="-60" r="1" fill="#000"/>
    
    <!-- K -->
    <path d="M 0 -40 L -20 -50 L -20 -70" fill="none" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
    <path d="M 0 -40 L 20 -50 L 20 -70" fill="none" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
    <circle cx="0" cy="-60" r="1" fill="#000"/> <circle cx="4" cy="-60" r="1" fill="#000"/> <circle cx="-4" cy="-60" r="1" fill="#000"/>

    <!-- V -->
    <path d="M -60 -40 L -80 -50 L -80 -70" fill="none" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
    <path d="M -60 -40 L -40 -50 L -40 -70" fill="none" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
    <circle cx="-60" cy="-60" r="1" fill="#000"/> <circle cx="-64" cy="-60" r="1" fill="#000"/> <circle cx="-56" cy="-60" r="1" fill="#000"/>

    <!-- Linear Layers (Stack) -->
    <rect x="-90" y="-100" width="180" height="30" rx="3" fill="#D9D2E9" stroke="#9A8CBE" stroke-width="1.5"/>
    <rect x="-95" y="-95" width="180" height="30" rx="3" fill="#D9D2E9" stroke="#9A8CBE" stroke-width="1.5"/>
    <rect x="-100" y="-90" width="180" height="30" rx="3" fill="#D9D2E9" stroke="#9A8CBE" stroke-width="1.5"/>
    <text x="-10" y="-70" font-size="14" text-anchor="middle">Linear</text>
    
    <!-- Lines up from Linear -->
    <line x1="-80" y1="-100" x2="-80" y2="-130" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="-20" y1="-100" x2="-20" y2="-130" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="40" y1="-100" x2="40" y2="-130" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
    <circle cx="-20" cy="-115" r="1" fill="#000"/> <circle cx="0" cy="-115" r="1" fill="#000"/> <circle cx="20" cy="-115" r="1" fill="#000"/>

    <!-- Attention Stack -->
    <rect x="-90" y="-190" width="140" height="60" rx="3" fill="#EAD1DC" stroke="#B08D9C" stroke-width="1.5"/>
    <rect x="-95" y="-185" width="140" height="60" rx="3" fill="#EAD1DC" stroke="#B08D9C" stroke-width="1.5"/>
    <rect x="-100" y="-180" width="140" height="60" rx="3" fill="#EAD1DC" stroke="#B08D9C" stroke-width="1.5"/>
    <text x="-30" y="-155" font-size="14" text-anchor="middle">Scaled Dot-Product</text>
    <text x="-30" y="-140" font-size="14" text-anchor="middle">Attention</text>

    <!-- Lines up -->
    <line x1="-80" y1="-190" x2="-40" y2="-230" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="-20" y1="-190" x2="-20" y2="-230" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="40" y1="-190" x2="0" y2="-230" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
    
    <!-- Concat -->
    <rect x="-60" y="-260" width="80" height="30" rx="3" fill="#FCE5CD" stroke="#DCA276" stroke-width="1.5"/>
    <text x="-20" y="-240" font-size="14" text-anchor="middle">Concat</text>

    <!-- Line up -->
    <line x1="-20" y1="-260" x2="-20" y2="-300" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Linear -->
    <rect x="-60" y="-330" width="80" height="30" rx="3" fill="#D9D2E9" stroke="#9A8CBE" stroke-width="1.5"/>
    <text x="-20" y="-310" font-size="14" text-anchor="middle">Linear</text>
    
    <line x1="-20" y1="-330" x2="-20" y2="-370" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)"/>
  </g>

</svg>
