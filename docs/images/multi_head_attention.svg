<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 440" width="760" height="440" style="background-color: white; font-family: sans-serif;">
  <defs>
    <marker id="arrow_orange" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#F97316"/></marker>
    <marker id="arrow_blue" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#3B82F6"/></marker>
    <marker id="arrow_green" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#22C55E"/></marker>
    <marker id="arrow_purple" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#A855F7"/></marker>
    <marker id="arrow_black" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#000000"/></marker>
  </defs>

  <!-- Main Flow (Centered vertically around Y=180) -->
  
  <rect x="20" y="160" width="90" height="40" rx="5" fill="#F3F4F6" stroke="#374151" stroke-width="2"/>
  <text x="65" y="185" font-size="12" text-anchor="middle" font-weight="bold" fill="#111827">Input X: B×T×C</text>
  <line x1="110" y1="180" x2="135" y2="180" stroke="#000" stroke-width="2" marker-end="url(#arrow_black)"/>

  <rect x="140" y="160" width="90" height="40" rx="5" fill="#F3F4F6" stroke="#374151" stroke-width="2"/>
  <text x="185" y="177" font-size="12" text-anchor="middle" font-weight="bold" fill="#111827">c_attn Linear</text>
  <text x="185" y="193" font-size="10" text-anchor="middle" fill="#4B5563">C → 3C</text>
  <line x1="230" y1="180" x2="255" y2="180" stroke="#000" stroke-width="2" marker-end="url(#arrow_black)"/>

  <rect x="260" y="160" width="50" height="40" rx="5" fill="#F3F4F6" stroke="#374151" stroke-width="2"/>
  <text x="285" y="185" font-size="12" text-anchor="middle" font-weight="bold" fill="#111827">Split</text>
  
  <!-- Split into Q, K, V -->
  <!-- Q Branch (Top) -->
  <path d="M 310 180 C 330 180, 330 100, 350 100" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrow_orange)"/>
  <rect x="355" y="80" width="40" height="40" rx="5" fill="#FFEDD5" stroke="#F97316" stroke-width="2"/>
  <text x="375" y="105" font-size="14" text-anchor="middle" font-weight="bold" fill="#EA580C">Q</text>
  <text x="375" y="70" font-size="10" text-anchor="middle" fill="#EA580C">B×h×T×dk</text>
  
  <!-- K Branch (Middle) -->
  <line x1="310" y1="180" x2="350" y2="180" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrow_blue)"/>
  <rect x="355" y="160" width="40" height="40" rx="5" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="375" y="185" font-size="14" text-anchor="middle" font-weight="bold" fill="#2563EB">K</text>
  <text x="375" y="150" font-size="10" text-anchor="middle" fill="#2563EB">B×h×T×dk</text>
  
  <!-- V Branch (Bottom) -->
  <path d="M 310 180 C 330 180, 330 260, 350 260" fill="none" stroke="#22C55E" stroke-width="2" marker-end="url(#arrow_green)"/>
  <rect x="355" y="240" width="40" height="40" rx="5" fill="#DCFCE7" stroke="#22C55E" stroke-width="2"/>
  <text x="375" y="265" font-size="14" text-anchor="middle" font-weight="bold" fill="#16A34A">V</text>
  <text x="375" y="230" font-size="10" text-anchor="middle" fill="#16A34A">B×h×T×dk</text>

  <!-- QK^T -->
  <path d="M 395 100 C 420 100, 420 140, 435 140" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrow_orange)"/>
  <path d="M 395 180 C 420 180, 420 140, 435 140" fill="none" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrow_blue)"/>
  <circle cx="455" cy="140" r="20" fill="#F3F4F6" stroke="#374151" stroke-width="2"/>
  <text x="455" y="144" font-size="10" text-anchor="middle" font-weight="bold" fill="#111827">QK^T</text>
  <text x="455" y="175" font-size="10" text-anchor="middle" fill="#4B5563">matmul</text>

  <line x1="475" y1="140" x2="495" y2="140" stroke="#000" stroke-width="2" marker-end="url(#arrow_black)"/>
  <rect x="500" y="125" width="45" height="30" rx="5" fill="#F3F4F6" stroke="#374151" stroke-width="2"/>
  <text x="522" y="144" font-size="11" text-anchor="middle" font-weight="bold" fill="#111827">÷ √dk</text>

  <line x1="545" y1="140" x2="565" y2="140" stroke="#000" stroke-width="2" marker-end="url(#arrow_black)"/>
  <rect x="570" y="125" width="55" height="30" rx="5" fill="#F3F4F6" stroke="#374151" stroke-width="2"/>
  <text x="597" y="144" font-size="11" text-anchor="middle" font-weight="bold" fill="#111827">+ Mask M</text>

  <line x1="625" y1="140" x2="645" y2="140" stroke="#000" stroke-width="2" marker-end="url(#arrow_black)"/>
  <rect x="650" y="125" width="60" height="30" rx="5" fill="#F3F4F6" stroke="#374151" stroke-width="2"/>
  <text x="680" y="144" font-size="11" text-anchor="middle" font-weight="bold" fill="#111827">Softmax</text>

  <!-- matmul V -->
  <path d="M 710 140 C 730 140, 730 200, 710 200" fill="none" stroke="#000" stroke-width="2" marker-end="url(#arrow_black)"/>
  <path d="M 395 260 C 650 260, 650 200, 665 200" fill="none" stroke="#22C55E" stroke-width="2" marker-end="url(#arrow_green)"/>
  <circle cx="685" cy="200" r="20" fill="#F3F4F6" stroke="#374151" stroke-width="2"/>
  <text x="685" y="204" font-size="12" text-anchor="middle" font-weight="bold" fill="#111827">× V</text>
  
  <line x1="665" y1="200" x2="645" y2="200" stroke="#A855F7" stroke-width="2" marker-end="url(#arrow_purple)"/>
  <rect x="545" y="185" width="95" height="30" rx="5" fill="#F3F4F6" stroke="#374151" stroke-width="2"/>
  <text x="592" y="204" font-size="11" text-anchor="middle" font-weight="bold" fill="#111827">Reshape</text>
  <text x="592" y="230" font-size="10" text-anchor="middle" fill="#4B5563">B×h×T×dk → B×T×C</text>

  <line x1="545" y1="200" x2="525" y2="200" stroke="#A855F7" stroke-width="2" marker-end="url(#arrow_purple)"/>
  <rect x="445" y="185" width="75" height="30" rx="5" fill="#F3F4F6" stroke="#374151" stroke-width="2"/>
  <text x="482" y="204" font-size="11" text-anchor="middle" font-weight="bold" fill="#111827">c_proj Linear</text>

  <line x1="445" y1="200" x2="425" y2="200" stroke="#A855F7" stroke-width="2" marker-end="url(#arrow_purple)"/>
  <rect x="365" y="185" width="55" height="30" rx="5" fill="#F3F4F6" stroke="#374151" stroke-width="2"/>
  <text x="392" y="204" font-size="12" text-anchor="middle" font-weight="bold" fill="#111827">Output</text>

  <!-- Inset: Causal Mask M -->
  <g transform="translate(280, 310)">
    <text x="100" y="-10" font-size="12" text-anchor="middle" font-weight="bold" fill="#111827">Causal Mask M — prevents attending to future tokens</text>
    <!-- 4x4 Grid -->
    <rect x="60" y="0" width="80" height="80" fill="none" stroke="#374151" stroke-width="2"/>
    <!-- Row 1 -->
    <rect x="60" y="0" width="20" height="20" fill="#fff" stroke="#ccc"/><text x="70" y="14" font-size="10" text-anchor="middle">0</text>
    <rect x="80" y="0" width="20" height="20" fill="#FCA5A5" stroke="#ccc"/><text x="90" y="14" font-size="10" text-anchor="middle">-∞</text>
    <rect x="100" y="0" width="20" height="20" fill="#FCA5A5" stroke="#ccc"/><text x="110" y="14" font-size="10" text-anchor="middle">-∞</text>
    <rect x="120" y="0" width="20" height="20" fill="#FCA5A5" stroke="#ccc"/><text x="130" y="14" font-size="10" text-anchor="middle">-∞</text>
    <!-- Row 2 -->
    <rect x="60" y="20" width="20" height="20" fill="#fff" stroke="#ccc"/><text x="70" y="34" font-size="10" text-anchor="middle">0</text>
    <rect x="80" y="20" width="20" height="20" fill="#fff" stroke="#ccc"/><text x="90" y="34" font-size="10" text-anchor="middle">0</text>
    <rect x="100" y="20" width="20" height="20" fill="#FCA5A5" stroke="#ccc"/><text x="110" y="34" font-size="10" text-anchor="middle">-∞</text>
    <rect x="120" y="20" width="20" height="20" fill="#FCA5A5" stroke="#ccc"/><text x="130" y="34" font-size="10" text-anchor="middle">-∞</text>
    <!-- Row 3 -->
    <rect x="60" y="40" width="20" height="20" fill="#fff" stroke="#ccc"/><text x="70" y="54" font-size="10" text-anchor="middle">0</text>
    <rect x="80" y="40" width="20" height="20" fill="#fff" stroke="#ccc"/><text x="90" y="54" font-size="10" text-anchor="middle">0</text>
    <rect x="100" y="40" width="20" height="20" fill="#fff" stroke="#ccc"/><text x="110" y="54" font-size="10" text-anchor="middle">0</text>
    <rect x="120" y="40" width="20" height="20" fill="#FCA5A5" stroke="#ccc"/><text x="130" y="54" font-size="10" text-anchor="middle">-∞</text>
    <!-- Row 4 -->
    <rect x="60" y="60" width="20" height="20" fill="#fff" stroke="#ccc"/><text x="70" y="74" font-size="10" text-anchor="middle">0</text>
    <rect x="80" y="60" width="20" height="20" fill="#fff" stroke="#ccc"/><text x="90" y="74" font-size="10" text-anchor="middle">0</text>
    <rect x="100" y="60" width="20" height="20" fill="#fff" stroke="#ccc"/><text x="110" y="74" font-size="10" text-anchor="middle">0</text>
    <rect x="120" y="60" width="20" height="20" fill="#fff" stroke="#ccc"/><text x="130" y="74" font-size="10" text-anchor="middle">0</text>
  </g>
</svg>
